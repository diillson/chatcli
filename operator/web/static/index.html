<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatCLI AIOps Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-hover: #1a2744;
  --accent: #0f3460;
  --highlight: #e94560;
  --success: #00b4d8;
  --warning: #f77f00;
  --text: #e0e0e0;
  --text-muted: #8892a4;
  --text-dim: #5a6577;
  --border: #2a3a5c;
  --sev-critical: #ff4757;
  --sev-high: #ff6348;
  --sev-medium: #ffa502;
  --sev-low: #2ed573;
  --radius: 8px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

html { font-size: 14px; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 1rem; }
.logo {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--highlight);
  letter-spacing: -0.5px;
}
.logo span { color: var(--text); font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 1rem; }
.time-range-picker { position: relative; }
.time-range-btn {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
  padding: 0.4rem 0.75rem; border-radius: var(--radius); cursor: pointer; font-size: 0.8rem;
  transition: border-color 0.2s;
}
.time-range-btn:hover { border-color: var(--highlight); }
.time-dropdown {
  position: absolute; top: 100%; right: 0; margin-top: 0.5rem; z-index: 100;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); min-width: 240px; padding: 0.5rem;
}
.time-presets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.25rem; margin-bottom: 0.5rem; }
.time-presets button {
  background: var(--accent); border: none; color: var(--text); padding: 0.35rem 0.5rem;
  border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: background 0.2s;
}
.time-presets button:hover { background: var(--highlight); }
.time-custom { border-top: 1px solid var(--border); padding-top: 0.5rem; }
.time-custom label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.time-custom input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 0.3rem; border-radius: 4px; font-size: 0.75rem; margin-bottom: 0.3rem;
}
.time-custom button {
  width: 100%; background: var(--highlight); border: none; color: white; padding: 0.35rem;
  border-radius: 4px; cursor: pointer; font-size: 0.75rem; margin-top: 0.25rem;
}
.refresh-indicator {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.refresh-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--sev-low);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.health-badge {
  padding: 0.25rem 0.6rem;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
}
.health-ok { background: rgba(46,213,115,0.15); color: var(--sev-low); }
.health-err { background: rgba(255,71,87,0.15); color: var(--sev-critical); }

/* ===== TABS ===== */
.tab-bar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 1.5rem;
  gap: 0;
  overflow-x: auto;
}
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  padding: 0.75rem 1.25rem;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
  font-family: inherit;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--highlight);
  border-bottom-color: var(--highlight);
}
.tab-btn .badge {
  margin-left: 0.4rem;
  background: var(--highlight);
  color: #fff;
  font-size: 0.65rem;
  padding: 0.1rem 0.4rem;
  border-radius: 8px;
  font-weight: 700;
}

/* ===== MAIN ===== */
.main { flex: 1; padding: 1.5rem; max-width: 1600px; margin: 0 auto; width: 100%; }
.page { display: none; }
.page.active { display: block; }

/* ===== CARDS ===== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--accent); }
.stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
.stat-value { font-size: 1.75rem; font-weight: 700; }
.stat-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

/* ===== GRID LAYOUTS ===== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

/* ===== PANEL ===== */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.panel-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title { font-size: 0.9rem; font-weight: 600; }
.panel-body { padding: 1.25rem; }

/* ===== TABLE ===== */
.table-wrap { overflow-x: auto; max-height: 70vh; overflow-y: auto; }
.table-wrap table thead { position: sticky; top: 0; z-index: 2; background: var(--card-bg); }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 0.6rem 0.75rem;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 0.6rem 0.75rem;
  font-size: 0.85rem;
  border-bottom: 1px solid rgba(42,58,92,0.4);
  vertical-align: top;
}
tr:hover td { background: rgba(15,52,96,0.15); }
tr.expandable { cursor: pointer; }
.expand-row td { padding: 0; }
.expand-content {
  padding: 1rem 1.5rem;
  background: rgba(15,52,96,0.1);
  font-size: 0.83rem;
  line-height: 1.6;
}
.expand-content h4 { color: var(--highlight); margin: 0.75rem 0 0.3rem; font-size: 0.85rem; }
.expand-content h4:first-child { margin-top: 0; }
.expand-content p { margin-bottom: 0.4rem; }
.expand-content ul { margin-left: 1.2rem; margin-bottom: 0.5rem; }

/* ===== BADGES ===== */
.badge-sev {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-critical { background: rgba(255,71,87,0.2); color: var(--sev-critical); }
.badge-high { background: rgba(255,99,72,0.2); color: var(--sev-high); }
.badge-medium { background: rgba(255,165,2,0.2); color: var(--sev-medium); }
.badge-low { background: rgba(46,213,115,0.2); color: var(--sev-low); }

.resource-kind-badge {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 600;
  color: #e0e0e0;
  white-space: nowrap;
  vertical-align: middle;
}

.action-type-badge {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  font-size: 0.65rem;
  font-weight: 500;
  font-family: 'SF Mono', Consolas, monospace;
  background: rgba(15,52,96,0.6);
  color: var(--success);
  border: 1px solid rgba(0,180,216,0.2);
}

.badge-state {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
}
.state-open, .state-firing, .state-pending { background: rgba(255,71,87,0.15); color: var(--sev-critical); }
.state-acknowledged, .state-investigating, .state-inreview { background: rgba(255,165,2,0.15); color: var(--sev-medium); }
.state-resolved, .state-closed, .state-approved, .state-healthy { background: rgba(46,213,115,0.15); color: var(--sev-low); }
.state-rejected { background: rgba(255,71,87,0.15); color: var(--sev-critical); }
.state-snoozed { background: rgba(0,180,216,0.15); color: var(--success); }
.state-unknown, .state-draft { background: rgba(136,146,164,0.15); color: var(--text-muted); }

/* ===== PIE CHART (CSS only) ===== */
.pie-container { display: flex; align-items: center; gap: 2rem; padding: 1rem 0; }
.pie {
  width: 140px; height: 140px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.pie-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-card);
  width: 70px; height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.pie-center .num { font-size: 1.3rem; font-weight: 700; }
.pie-center .lbl { font-size: 0.6rem; color: var(--text-muted); }
.pie-legend { display: flex; flex-direction: column; gap: 0.5rem; }
.legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ===== TIMELINE ===== */
.timeline { position: relative; padding-left: 1.5rem; }
.timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--border);
}
.timeline-item {
  position: relative;
  padding-bottom: 1rem;
  font-size: 0.83rem;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -1.5rem;
  top: 4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--highlight);
}
.timeline-time { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.2rem; }
.timeline-text { color: var(--text); }
.timeline-type { color: var(--highlight); font-weight: 600; margin-right: 0.4rem; }

/* ===== GAUGE BAR ===== */
.gauge-bar {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  margin: 0.4rem 0;
}
.gauge-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.gauge-ok { background: var(--sev-low); }
.gauge-warn { background: var(--sev-medium); }
.gauge-danger { background: var(--sev-critical); }

/* ===== BURN RATES ===== */
.burn-rates { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem; }
.burn-chip {
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  background: rgba(255,255,255,0.05);
}
.burn-ok { color: var(--sev-low); }
.burn-warn { color: var(--sev-medium); }
.burn-danger { color: var(--sev-critical); }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.4rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.8rem;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: var(--accent); border-color: var(--accent); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--highlight); border-color: var(--highlight); color: #fff; }
.btn-primary:hover { background: #d63851; }
.btn-success { background: rgba(46,213,115,0.2); border-color: var(--sev-low); color: var(--sev-low); }
.btn-success:hover { background: rgba(46,213,115,0.35); }
.btn-danger { background: rgba(255,71,87,0.2); border-color: var(--sev-critical); color: var(--sev-critical); }
.btn-danger:hover { background: rgba(255,71,87,0.35); }
.btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

/* ===== FILTERS ===== */
.filters {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.filter-select, .filter-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 0.4rem 0.75rem;
  font-size: 0.8rem;
  font-family: inherit;
  outline: none;
}
.filter-select:focus, .filter-input:focus { border-color: var(--highlight); }

/* ===== INPUT ===== */
.input-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
.input-group label { font-size: 0.75rem; color: var(--text-muted); }
.input-group input, .input-group textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 0.5rem 0.75rem;
  font-size: 0.85rem;
  font-family: inherit;
  outline: none;
  resize: vertical;
}
.input-group input:focus, .input-group textarea:focus { border-color: var(--highlight); }

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  top: 70px;
  right: 1.5rem;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast {
  padding: 0.75rem 1.25rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  max-width: 380px;
}
.toast-success { background: #0d5a3c; color: #a8f0d4; border: 1px solid var(--sev-low); }
.toast-error { background: #5a1520; color: #ffa5ad; border: 1px solid var(--sev-critical); }
.toast-info { background: #0a3a5a; color: #a5dff0; border: 1px solid var(--success); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ===== LOADING ===== */
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--highlight);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 2rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
  flex-direction: column;
  gap: 0.75rem;
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ===== ERROR STATE ===== */
.error-state {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
}
.error-state p { margin-bottom: 1rem; font-size: 0.9rem; }

/* ===== CLUSTER CARD ===== */
.cluster-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}
.cluster-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
.cluster-name { font-weight: 600; font-size: 1rem; }
.cluster-detail { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.25rem; }
.cluster-detail b { color: var(--text); font-weight: 500; }

/* ===== APPROVAL CARD ===== */
.approval-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}
.approval-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.approval-name { font-weight: 600; font-size: 0.95rem; }
.approval-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.approval-actions { display: flex; gap: 0.5rem; align-items: flex-end; margin-top: 0.75rem; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .grid-2 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .pie-container { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 600px) {
  .header { padding: 0 1rem; }
  .main { padding: 1rem; }
  .tab-bar { padding: 0 0.5rem; }
  .tab-btn { padding: 0.6rem 0.75rem; font-size: 0.8rem; }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 2.5rem;
  color: var(--text-muted);
  font-size: 0.9rem;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">ChatCLI <span>AIOps</span></div>
  </div>
  <div class="header-right">
    <div class="time-range-picker" id="timeRangePicker">
      <button class="time-range-btn" onclick="toggleTimeDropdown()" title="Time range filter">
        <span id="timeRangeLabel">All time</span> ▾
      </button>
      <div class="time-dropdown" id="timeDropdown" style="display:none">
        <div class="time-presets">
          <button onclick="setTimeRange('1h')">Last 1h</button>
          <button onclick="setTimeRange('6h')">Last 6h</button>
          <button onclick="setTimeRange('24h')">Last 24h</button>
          <button onclick="setTimeRange('7d')">Last 7d</button>
          <button onclick="setTimeRange('30d')">Last 30d</button>
          <button onclick="setTimeRange('all')">All time</button>
        </div>
        <div class="time-custom">
          <label>From <input type="datetime-local" id="timeFrom"></label>
          <label>To <input type="datetime-local" id="timeTo"></label>
          <button onclick="applyCustomRange()">Apply</button>
        </div>
      </div>
    </div>
    <div class="refresh-indicator" style="display:flex; align-items:center; gap:0.5rem;">
      <div class="refresh-dot" id="refreshDot"></div>
      <select id="refreshSelect" class="filter-select" style="width:auto; padding:0.25rem 0.5rem; font-size:0.75rem;" onchange="changeRefreshInterval()">
        <option value="0">Off</option>
        <option value="10">10s</option>
        <option value="30" selected>30s</option>
        <option value="60">1m</option>
        <option value="120">2m</option>
        <option value="300">5m</option>
      </select>
      <span id="refreshTimer" style="font-size:0.75rem; color:var(--text-muted); min-width:40px;">30s</span>
      <button class="btn" style="padding:0.2rem 0.5rem; font-size:0.75rem;" onclick="manualRefresh()" title="Refresh now">&#8635;</button>
    </div>
    <span class="health-badge health-ok" id="healthBadge">Healthy</span>
  </div>
</header>

<!-- TAB BAR -->
<nav class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="incidents">Incidents</button>
  <button class="tab-btn" data-tab="slos">SLOs</button>
  <button class="tab-btn" data-tab="approvals">Approvals <span class="badge" id="approvalBadge" style="display:none">0</span></button>
  <button class="tab-btn" data-tab="aiinsights">AI Insights</button>
  <button class="tab-btn" data-tab="remediations">Remediations</button>
  <button class="tab-btn" data-tab="runbooks">Runbooks</button>
  <button class="tab-btn" data-tab="postmortems">PostMortems</button>
  <button class="tab-btn" data-tab="clusters">Clusters</button>
  <button class="tab-btn" data-tab="audit">Audit</button>
</nav>

<!-- MAIN CONTENT -->
<main class="main">

  <!-- OVERVIEW PAGE -->
  <div class="page active" id="page-overview">
    <div class="stats-grid" id="overviewStats"></div>
    <div class="grid-2">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Issues by Severity</span></div>
        <div class="panel-body" id="severityPie"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Remediation Activity</span></div>
        <div class="panel-body" id="remediationTimeline"></div>
      </div>
    </div>
    <div id="capacityWarnings"></div>
    <div class="grid-2">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Compliance & SLA</span></div>
        <div class="panel-body" id="complianceCard"></div>
      </div>

<script>
// ============================================================
// ChatCLI AIOps Dashboard - Pure Vanilla JS
// ============================================================

const API = '/api/v1';
let currentTab = 'overview';
let refreshInterval = null;
let refreshCountdown = 30;
let refreshSeconds = 30; // 0 = off
let expandedRows = new Set();

// Sort state per tab: { tabName: { colIdx, asc } }
const sortState = {};

// ===== UTILITY FUNCTIONS =====

async function apiFetch(path, opts = {}) {
  try {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: res.statusText }));
      throw new Error(err.message || res.statusText);
    }
    return res.json();
  } catch (e) {
    console.error(`API error ${path}:`, e);
    throw e;
  }
}

async function apiPost(path, body) {
  return apiFetch(path, { method: 'POST', body: JSON.stringify(body) });
}

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

// Sortable table columns — click header to sort ascending, click again for descending
function sortTableByCol(tableEl, colIdx, asc) {
  const tbody = tableEl.querySelector('tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr:not(.expand-row)'));
  rows.sort((a, b) => {
    const aSortVal = a.cells[colIdx]?.dataset.sortValue;
    const bSortVal = b.cells[colIdx]?.dataset.sortValue;
    if (aSortVal !== undefined && bSortVal !== undefined) {
      const an = parseFloat(aSortVal), bn = parseFloat(bSortVal);
      if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
      return asc ? aSortVal.localeCompare(bSortVal) : bSortVal.localeCompare(aSortVal);
    }
    const av = (a.cells[colIdx]?.textContent || '').trim().toLowerCase();
    const bv = (b.cells[colIdx]?.textContent || '').trim().toLowerCase();
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
    const timeToSecs = s => {
      const m = s.match(/^(\d+)(s|m|h|d) ago$/);
      if (!m) return NaN;
      const v = parseInt(m[1]);
      switch(m[2]) { case 's': return v; case 'm': return v*60; case 'h': return v*3600; case 'd': return v*86400; }
      return NaN;
    };
    const at = timeToSecs(av), bt = timeToSecs(bv);
    if (!isNaN(at) && !isNaN(bt)) return asc ? at - bt : bt - at;
    return asc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  rows.forEach(r => {
    tbody.appendChild(r);
    const expandRow = tbody.querySelector(`.expand-row[data-parent="${r.dataset.rowId}"]`);
    if (expandRow) tbody.appendChild(expandRow);
  });
  const headers = tableEl.querySelectorAll('thead th');
  headers.forEach(h => h.textContent = h.textContent.replace(/ [▲▼]$/, ''));
  if (headers[colIdx]) headers[colIdx].textContent += asc ? ' ▲' : ' ▼';
}

function makeSortable(tableEl, defaultSortCol) {
  if (!tableEl) return;
  const headers = tableEl.querySelectorAll('thead th');

  // Find timestamp column as default sort if not specified
  if (defaultSortCol === undefined) {
    headers.forEach((th, i) => {
      const txt = th.textContent.toLowerCase();
      if (txt.includes('created') || txt.includes('age') || txt.includes('timestamp') || txt.includes('time')) {
        defaultSortCol = i;
      }
    });
  }

  headers.forEach((th, colIdx) => {
    if (!th.textContent.trim()) return;
    th.style.cursor = 'pointer';
    th.style.userSelect = 'none';
    th.title = 'Click to sort';
    th.addEventListener('click', () => {
      const saved = sortState[currentTab];
      const asc = (saved && saved.colIdx === colIdx) ? !saved.asc : (colIdx === defaultSortCol ? false : true);
      sortState[currentTab] = { colIdx, asc };
      sortTableByCol(tableEl, colIdx, asc);
    });
  });

  // Restore saved sort or apply default (timestamp DESC = newest first)
  const saved = sortState[currentTab];
  if (saved !== undefined) {
    sortTableByCol(tableEl, saved.colIdx, saved.asc);
  } else if (defaultSortCol !== undefined) {
    sortState[currentTab] = { colIdx: defaultSortCol, asc: false };
    sortTableByCol(tableEl, defaultSortCol, false);
  }
}

// ── Time Range Picker ──────────────────────────────────────────────────
let globalTimeRange = { from: null, to: null, label: 'All time' };

function toggleTimeDropdown() {
  const dd = $('#timeDropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  const picker = document.getElementById('timeRangePicker');
  if (picker && !picker.contains(e.target)) {
    document.getElementById('timeDropdown').style.display = 'none';
  }
});

function setTimeRange(preset) {
  const now = new Date();
  let from = null;
  let label = 'All time';

  switch (preset) {
    case '1h':  from = new Date(now - 3600000); label = 'Last 1h'; break;
    case '6h':  from = new Date(now - 21600000); label = 'Last 6h'; break;
    case '24h': from = new Date(now - 86400000); label = 'Last 24h'; break;
    case '7d':  from = new Date(now - 604800000); label = 'Last 7d'; break;
    case '30d': from = new Date(now - 2592000000); label = 'Last 30d'; break;
    case 'all': from = null; label = 'All time'; break;
  }

  globalTimeRange = { from, to: preset === 'all' ? null : now, label };
  $('#timeRangeLabel').textContent = label;
  $('#timeDropdown').style.display = 'none';
  refreshCurrentTab();
}

function applyCustomRange() {
  const fromInput = $('#timeFrom').value;
  const toInput = $('#timeTo').value;
  if (!fromInput) return;

  const from = new Date(fromInput);
  const to = toInput ? new Date(toInput) : new Date();
  const label = `${from.toLocaleDateString()} – ${to.toLocaleDateString()}`;

  globalTimeRange = { from, to, label };
  $('#timeRangeLabel').textContent = label;
  $('#timeDropdown').style.display = 'none';
  refreshCurrentTab();
}

function getTimeRangeQuery() {
  let q = '';
  if (globalTimeRange.from) {
    q += '&from=' + encodeURIComponent(globalTimeRange.from.toISOString());
  }
  if (globalTimeRange.to) {
    q += '&to=' + encodeURIComponent(globalTimeRange.to.toISOString());
  }
  return q;
}

function refreshCurrentTab() {
  const activeTab = document.querySelector('.tab-bar .tab.active');
  if (activeTab) activeTab.click();
}

function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML.replace(/'/g, '&#39;');
}

function timeAgo(dateStr) {
  if (!dateStr) return '-';
  const now = Date.now();
  const t = new Date(dateStr).getTime();
  const diff = Math.max(0, now - t);
  const secs = Math.floor(diff / 1000);
  if (secs < 60) return secs + 's ago';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function severityBadge(sev) {
  const s = (sev || '').toLowerCase().replace(/[^a-z0-9-]/g, '');
  return `<span class="badge-sev badge-${s}">${escapeHtml(sev || 'unknown')}</span>`;
}

function resourceKindBadge(kind) {
  const icons = {
    'Deployment': '🚀', 'StatefulSet': '🗄️', 'DaemonSet': '🌐',
    'Job': '⚡', 'CronJob': '⏰', 'Node': '🖥️', 'Pod': '📦',
  };
  const colors = {
    'Deployment': '#0f3460', 'StatefulSet': '#6c3483', 'DaemonSet': '#1a5276',
    'Job': '#784212', 'CronJob': '#7d6608', 'Node': '#1b4332', 'Pod': '#2c3e50',
  };
  const icon = icons[kind] || '📋';
  const color = colors[kind] || 'var(--accent)';
  return `<span class="resource-kind-badge" style="background:${color}" title="${escapeHtml(kind || 'Unknown')}">${icon} ${escapeHtml(kind || '?')}</span>`;
}

function stateBadge(state) {
  const s = (state || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  return `<span class="badge-state state-${s}">${escapeHtml(state || 'Unknown')}</span>`;
}

function showLoading(el) {
  el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><span>Loading...</span></div>';
}

function showError(el, msg, retryFn) {
  el.innerHTML = `<div class="error-state"><p>${escapeHtml(msg)}</p>${retryFn ? '<button class="btn btn-primary" onclick="' + retryFn + '">Retry</button>' : ''}</div>`;
}

function showEmpty(el, msg) {
  el.innerHTML = `<div class="empty-state">${escapeHtml(msg || 'No data available')}</div>`;
}

function toast(msg, type = 'info') {
  const c = $('#toastContainer');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
}

// ===== TAB NAVIGATION =====

function switchTab(tab) {
  currentTab = tab;
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  $$('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + tab));
  expandedRows.clear();
  loadCurrentTab();
}

$('#tabBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (btn) switchTab(btn.dataset.tab);
});

// ===== AUTO-REFRESH =====

function startRefresh() {
  clearInterval(refreshInterval);
  if (refreshSeconds <= 0) {
    $('#refreshTimer').textContent = 'Off';
    $('#refreshDot').style.background = 'var(--text-dim)';
    return;
  }
  refreshCountdown = refreshSeconds;
  $('#refreshDot').style.background = 'var(--success)';
  refreshInterval = setInterval(() => {
    refreshCountdown--;
    $('#refreshTimer').textContent = `${refreshCountdown}s`;
    if (refreshCountdown <= 0) {
      refreshCountdown = refreshSeconds;
      loadCurrentTab();
    }
  }, 1000);
}

function changeRefreshInterval() {
  refreshSeconds = parseInt($('#refreshSelect').value, 10);
  startRefresh();
}

function manualRefresh() {
  loadCurrentTab();
  if (refreshSeconds > 0) {
    refreshCountdown = refreshSeconds;
  }
}

function loadCurrentTab() {
  switch (currentTab) {
    case 'overview': loadOverview(); break;
    case 'incidents': loadIncidents(); break;
    case 'slos': loadSLOs(); break;
    case 'approvals': loadApprovals(); break;
    case 'aiinsights': loadAIInsights(); break;
    case 'remediations': loadRemediations(); break;
    case 'runbooks': loadRunbooks(); break;
    case 'postmortems': loadPostMortems(); break;
    case 'clusters': loadClusters(); break;
    case 'audit': loadAudit(); break;
  }
  checkHealth();
}

// ===== HEALTH CHECK =====

async function checkHealth() {
  try {
    const res = await fetch('/healthz');
    const data = await res.json();
    const badge = $('#healthBadge');
    if (data.status === 'ok') {
      badge.textContent = 'Healthy';
      badge.className = 'health-badge health-ok';
      $('#refreshDot').style.background = 'var(--sev-low)';
    } else {
      badge.textContent = 'Degraded';
      badge.className = 'health-badge health-err';
      $('#refreshDot').style.background = 'var(--sev-critical)';
    }
  } catch {
    const badge = $('#healthBadge');
    badge.textContent = 'Disconnected';
    badge.className = 'health-badge health-err';
    $('#refreshDot').style.background = 'var(--sev-critical)';
  }
}

// ===== OVERVIEW PAGE =====

async function loadOverview() {
  loadOverviewStats();
  loadSeverityPie();
  loadRecentIncidents();
  loadRemediationTimeline();
  loadComplianceCard();
  loadCapacityWarnings();
}

async function loadOverviewStats() {
  const el = $('#overviewStats');
  try {
    const data = await apiFetch('/analytics/summary?' + getTimeRangeQuery());
    const s = data.spec || {};
    const successRate = s.remediatedIssues > 0 ? (s.resolvedByRemediation / s.remediatedIssues) : 0;
    const cards = [
      { label: 'Active Issues', value: s.openIssues ?? 0, color: 'var(--sev-critical)' },
      { label: 'Resolved', value: s.resolvedIssues ?? 0, color: 'var(--sev-low)' },
      { label: 'Remediations', value: `${s.resolvedByRemediation ?? 0}/${s.remediatedIssues ?? 0}`, color: 'var(--success)' },
      { label: 'Success Rate', value: (successRate * 100).toFixed(1) + '%', color: 'var(--sev-low)' },
      { label: 'PostMortems', value: s.totalPostMortems ?? 0, color: 'var(--sev-medium)' },
      { label: 'Pending Approvals', value: s.pendingApprovals ?? 0, color: 'var(--warning)' },
    ];
    el.innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="stat-label">${c.label}</div>
        <div class="stat-value" style="color:${c.color}">${c.value}</div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = buildFallbackStats();
  }
}

function buildFallbackStats() {
  const cards = [
    { label: 'Active Issues', value: '-' },
    { label: 'Resolved (24h)', value: '-' },
    { label: 'MTTR', value: '-' },
    { label: 'Success Rate', value: '-' },
    { label: 'SLO Budget', value: '-' },
    { label: 'Active Clusters', value: '-' },
  ];
  return cards.map(c => `
    <div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="color:var(--text-muted)">${c.value}</div>
    </div>
  `).join('');
}

function formatDuration(val) {
  if (!val) return '-';
  if (typeof val === 'string') return val;
  if (typeof val === 'number') {
    if (val < 60) return Math.round(val) + 's';
    if (val < 3600) return Math.round(val / 60) + 'm';
    return (val / 3600).toFixed(1) + 'h';
  }
  return String(val);
}

async function loadSeverityPie() {
  const el = $('#severityPie');
  try {
    const data = await apiFetch('/incidents?pageSize=100' + getTimeRangeQuery());
    const items = data.items || [];
    const counts = { critical: 0, high: 0, medium: 0, low: 0 };
    items.forEach(i => {
      const s = (i.severity || '').toLowerCase();
      if (counts.hasOwnProperty(s)) counts[s]++;
    });
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (total === 0) {
      showEmpty(el, 'No incidents to display');
      return;
    }
    const colors = { critical: 'var(--sev-critical)', high: 'var(--sev-high)', medium: 'var(--sev-medium)', low: 'var(--sev-low)' };
    let gradParts = [];
    let deg = 0;
    for (const [sev, count] of Object.entries(counts)) {
      if (count === 0) continue;
      const pct = (count / total) * 360;
      gradParts.push(`${colors[sev]} ${deg}deg ${deg + pct}deg`);
      deg += pct;
    }
    el.innerHTML = `
      <div class="pie-container">
        <div class="pie" style="background: conic-gradient(${gradParts.join(', ')})">
          <div class="pie-center"><span class="num">${total}</span><span class="lbl">Total</span></div>
        </div>
        <div class="pie-legend">
          ${Object.entries(counts).map(([s, c]) => `
            <div class="legend-item">
              <div class="legend-dot" style="background:${colors[s]}"></div>
              <span>${s.charAt(0).toUpperCase() + s.slice(1)}: ${c}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } catch (e) {
    showError(el, 'Failed to load severity data', 'loadSeverityPie()');
  }
}

async function loadIncidents() {
  const el = $('#incidentsTableBody');
  showLoading(el);
  const sev = $('#incSeverityFilter').value;
  const state = $('#incStateFilter').value;
  const kindFilter = $('#incKindFilter').value;
  const ns = $('#incNamespaceFilter').value;
  let q = '?pageSize=100';
  if (sev) q += '&severity=' + encodeURIComponent(sev);
  if (state) q += '&state=' + encodeURIComponent(state);
  if (ns) q += '&namespace=' + encodeURIComponent(ns);
  try {
    const data = await apiFetch('/incidents' + q + getTimeRangeQuery());
    let items = (data.items || []).sort((a, b) => (b.creationTimestamp || '').localeCompare(a.creationTimestamp || ''));
    // Client-side filter by resource kind
    if (kindFilter) {
      items = items.filter(i => (i.resource || {}).kind === kindFilter);
    }
    const total = (data.metadata || {}).totalCount || items.length;
    $('#incidentCount').textContent = `${total} incident(s)`;
    if (items.length === 0) { showEmpty(el, 'No incidents match the filters'); return; }
    el.innerHTML = `<table>
      <thead><tr>
        <th></th><th>Name</th><th>Severity</th><th>State</th><th>Resource</th><th>Namespace</th><th>Risk</th><th>Age</th><th>Actions</th>
      </tr></thead>
      <tbody id="incidentsTbody"></tbody>
    </table>`;
    const tbody = $('#incidentsTbody');
    items.forEach((item, idx) => {
      const id = 'inc-' + idx;
      const isExpanded = expandedRows.has(id);
      const mainRow = document.createElement('tr');
      mainRow.className = 'expandable';
      mainRow.dataset.rowId = id;
      mainRow.innerHTML = `
        <td style="width:20px; cursor:pointer; color:var(--text-muted)">${isExpanded ? '&#9660;' : '&#9654;'}</td>
        <td>${escapeHtml(item.name)}</td>
        <td>${severityBadge(item.severity)}</td>
        <td>${stateBadge(item.state)}</td>
        <td>${resourceKindBadge((item.resource||{}).kind)} ${escapeHtml((item.resource||{}).name)}</td>
        <td>${escapeHtml(item.namespace)}</td>
        <td data-sort-value="${item.riskScore || 0}">${item.riskScore != null ? item.riskScore.toFixed(1) : '-'}</td>
        <td data-sort-value="${new Date(item.creationTimestamp || 0).getTime()}">${timeAgo(item.creationTimestamp)}</td>
        <td class="btn-group">
          ${item.state !== 'Resolved' ? `<button class="btn btn-success" onclick="event.stopPropagation(); ackIncident('${escapeHtml(item.name)}', '${escapeHtml(item.namespace)}')">Ack</button>` : ''}
          ${item.state !== 'Resolved' ? `<button class="btn" onclick="event.stopPropagation(); snoozeIncident('${escapeHtml(item.name)}', '${escapeHtml(item.namespace)}')">Snooze</button>` : ''}
          ${item.state === 'Escalated' ? `<button class="btn" style="background:var(--sev-low);color:#000;font-weight:700" onclick="event.stopPropagation(); resolveIncident('${escapeHtml(item.name)}', '${escapeHtml(item.namespace)}')">Resolve</button>` : ''}
        </td>
      `;
      mainRow.addEventListener('click', () => toggleIncidentExpand(id, item, mainRow));
      tbody.appendChild(mainRow);
      if (isExpanded) {
        const expandRow = buildIncidentExpandRow(item);
        tbody.appendChild(expandRow);
      }
    });
    makeSortable(el.querySelector('table'));
  } catch (e) {
    showError(el, 'Failed to load incidents: ' + e.message, 'loadIncidents()');
  }
}

function toggleIncidentExpand(id, item, mainRow) {
  if (expandedRows.has(id)) {
    expandedRows.delete(id);
    const next = mainRow.nextElementSibling;
    if (next && next.classList.contains('expand-row')) next.remove();
    mainRow.querySelector('td').innerHTML = '&#9654;';
  } else {
    expandedRows.add(id);
    const expandRow = buildIncidentExpandRow(item);
    mainRow.after(expandRow);
    mainRow.querySelector('td').innerHTML = '&#9660;';
  }
}

function buildIncidentExpandRow(item) {
  const tr = document.createElement('tr');
  tr.className = 'expand-row';
  tr.dataset.parent = item._rowId || '';
  const res = item.resource || {};
  tr.innerHTML = `<td colspan="9">
    <div class="expand-content">
      <h4>Description</h4>
      <p>${escapeHtml(item.description || 'No description available')}</p>
      <h4>Resource</h4>
      <p>${resourceKindBadge(res.kind)} <strong>${escapeHtml(res.name || '-')}</strong> in <em>${escapeHtml(res.namespace || item.namespace || '-')}</em></p>
      <h4>Details</h4>
      <p>Signal Type: <span class="action-type-badge">${escapeHtml(item.signalType || '-')}</span> | Source: ${escapeHtml(item.source || '-')} | Risk Score: <strong>${item.riskScore != null ? item.riskScore.toFixed(1) : '-'}</strong></p>
      <p>Remediation Attempts: ${item.remediationAttempts || 0} / ${item.maxRemediationAttempts || '-'}</p>
      ${item.resolution ? `<h4>Resolution</h4><p>${escapeHtml(item.resolution)}</p>` : ''}
      <div style="display:flex;gap:2rem;margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted)">
        ${item.detectedAt ? `<span>Detected: ${new Date(item.detectedAt).toLocaleString()}</span>` : ''}
        ${item.resolvedAt ? `<span>Resolved: ${new Date(item.resolvedAt).toLocaleString()}</span>` : ''}
        ${item.detectedAt && item.resolvedAt ? `<span>Duration: ${formatDuration(new Date(item.resolvedAt) - new Date(item.detectedAt))}</span>` : ''}
      </div>
      <div id="ai-preview-${escapeHtml(item.name)}" style="margin-top:0.5rem;"></div>
    </div>
  </td>`;
  // Async load AI insight preview for this incident
  loadAIInsightPreview(item.name);
  return tr;
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '-';
  const secs = Math.floor(ms / 1000);
  if (secs < 60) return secs + 's';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ' + (secs % 60) + 's';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ' + (mins % 60) + 'm';
  const days = Math.floor(hrs / 24);
  return days + 'd ' + (hrs % 24) + 'h';
}

// Enhancement #4/#8: Load AI insight preview inline in incident expand row
async function loadAIInsightPreview(incidentName) {
  const el = document.getElementById('ai-preview-' + incidentName);
  if (!el) return;
  try {
    const data = await apiFetch('/aiinsights?issue=' + encodeURIComponent(incidentName) + '&pageSize=1');
    const items = data.items || [];
    if (items.length === 0) return;
    const ai = items[0];
    const confPct = ((ai.confidence || 0) * 100).toFixed(0);
    const confColor = ai.confidence >= 0.85 ? 'var(--sev-low)' : ai.confidence >= 0.7 ? 'var(--sev-medium)' : 'var(--sev-high)';
    const recs = (ai.recommendations || []).slice(0, 3);
    el.innerHTML = `
      <h4 style="display:flex;align-items:center;gap:0.5rem;">AI Analysis
        <span style="background:${confColor}; color:#fff; padding:0.1rem 0.4rem; border-radius:4px; font-size:0.7rem;">${confPct}% confidence</span>
        <span style="font-size:0.7rem; color:var(--text-dim)">${escapeHtml(ai.provider || '')} / ${escapeHtml(ai.model || '')}</span>
      </h4>
      <p style="font-size:0.8rem; max-height:100px; overflow-y:auto; white-space:pre-wrap;">${escapeHtml((ai.analysis || '').substring(0, 500))}${(ai.analysis || '').length > 500 ? '...' : ''}</p>
      ${recs.length > 0 ? `<div style="font-size:0.8rem;"><strong>Recommendations:</strong><ul style="margin:0.2rem 0 0 1rem;">${recs.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul></div>` : ''}
    `;
  } catch (e) { /* silent */ }
}

async function ackIncident(name, ns) {
  try {
    await apiPost(`/incidents/${name}/acknowledge?namespace=${encodeURIComponent(ns)}`, {});

    toast(`Incident ${name} resolved`, 'success');
    loadIncidents();

    toast(`Failed to resolve: ${e.message}`, 'error');

// ===== SLOs PAGE =====

async function loadSLOs() {
  const cardsEl = $('#sloCards');
  const alertsEl = $('#sloAlerts');
  showLoading(cardsEl);
  try {
    const data = await apiFetch('/slos?pageSize=100' + getTimeRangeQuery());
    const items = (data.items || []).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    if (items.length === 0) { showEmpty(cardsEl, 'No SLOs configured'); showEmpty(alertsEl, 'No alerts'); return; }
    cardsEl.innerHTML = items.map(slo => {
      const budgetPct = slo.errorBudgetRemaining || 100;
      const budgetClass = budgetPct > 50 ? 'gauge-ok' : budgetPct > 20 ? 'gauge-warn' : 'gauge-danger';
      const currentPct = slo.currentValue || 0;
      const target = slo.target || 99.9;
      const meeting = currentPct >= target;
      return `
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">${escapeHtml(slo.service || slo.name)}</span>
            ${stateBadge(slo.state || (meeting ? 'Healthy' : 'Firing'))}
          </div>
          <div class="panel-body">
            <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
              <span style="font-size:0.8rem; color:var(--text-muted)">SLI: ${escapeHtml(slo.sli || '-')}</span>
              <span style="font-size:0.8rem; color:var(--text-muted)">Window: ${escapeHtml(slo.window || '30d')}</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.3rem;">
              <span style="font-size:1.5rem; font-weight:700; color:${meeting ? 'var(--sev-low)' : 'var(--sev-critical)'}">
                ${currentPct.toFixed(2)}%
              </span>
              <span style="font-size:0.8rem; color:var(--text-muted)">Target: ${target.toFixed(2)}%</span>
            </div>
            <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:0.3rem;">Error Budget Remaining</div>
            <div class="gauge-bar"><div class="gauge-fill ${budgetClass}" style="width:${Math.max(0, Math.min(100, budgetPct))}%"></div></div>
            <div style="font-size:0.75rem; color:var(--text-muted); text-align:right">${budgetPct.toFixed(1)}%</div>
            <div class="burn-rates">
              ${buildBurnChip('1h', slo)}
              ${buildBurnChip('6h', slo)}
              ${buildBurnChip('24h', slo)}
              ${buildBurnChip('72h', slo)}
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Show alerts for SLOs that are breaching
    const alertItems = items.filter(s => (s.state || '').toLowerCase() === 'firing' || (s.currentValue || 0) < (s.target || 99.9));
    if (alertItems.length === 0) {
      alertsEl.innerHTML = '<div class="empty-state">No active SLO alerts</div>';
    } else {
      alertsEl.innerHTML = `<table>
        <thead><tr><th>Service</th><th>Current</th><th>Target</th><th>Budget</th><th>State</th></tr></thead>
        <tbody>
          ${alertItems.map(s => `<tr>
            <td>${escapeHtml(s.service || s.name)}</td>
            <td style="color:var(--sev-critical)">${(s.currentValue || 0).toFixed(2)}%</td>
            <td>${(s.target || 99.9).toFixed(2)}%</td>
            <td>${(s.errorBudgetRemaining || 0).toFixed(1)}%</td>
            <td>${stateBadge(s.state || (s.currentValue >= s.target ? 'Healthy' : 'Firing'))}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    }
  } catch (e) {
    showError(cardsEl, 'Failed to load SLOs: ' + e.message, 'loadSLOs()');
    showEmpty(alertsEl, '');
  }
}

function buildBurnChip(window, slo) {
  // Compute a simulated burn rate from the available budget data
  const budgetUsedPct = slo.errorBudgetTotal > 0 ? (slo.errorBudgetUsed / slo.errorBudgetTotal) : 0;
  let rate;
  switch(window) {
    case '1h': rate = budgetUsedPct * 720; break;
    case '6h': rate = budgetUsedPct * 120; break;
    case '24h': rate = budgetUsedPct * 30; break;
    case '72h': rate = budgetUsedPct * 10; break;
    default: rate = 0;
  }
  const cls = rate > 14 ? 'burn-danger' : rate > 1 ? 'burn-warn' : 'burn-ok';
  return `<span class="burn-chip ${cls}">${window}: ${rate.toFixed(1)}x</span>`;
}

  return tr;
}

function togglePMExpand(id, item, mainRow) {

              <span class="star-rating" data-pm="${escapeHtml(item.name)}">
                ${[1,2,3,4,5].map(n => `<span class="star" data-value="${n}" style="cursor:pointer; font-size:1.3rem; color:var(--text-muted)" onmouseover="previewStars(this)" onmouseout="resetStars(this)" onclick="selectStar(this)">☆</span>`).join('')}

async function reviewPM(name, ns) {
  try {
    await apiPost(`/postmortems/${name}/review?namespace=${encodeURIComponent(ns)}`, { reviewer: 'web-ui' });
    toast(`Post-mortem ${name} marked for review`, 'success');
    loadPostMortems();
  } catch (e) {
    toast(`Failed to review: ${e.message}`, 'error');
  }
}

async function closePM(name, ns) {
  try {
    await apiPost(`/postmortems/${name}/close?namespace=${encodeURIComponent(ns)}`, { reviewer: 'web-ui', notes: 'Closed via Web UI' });
    toast(`Post-mortem ${name} closed`, 'success');
    loadPostMortems();
  } catch (e) {
    toast(`Failed to close: ${e.message}`, 'error');
  }
}

function previewStars(el) {
  const val = parseInt(el.dataset.value);
  const siblings = el.parentElement.querySelectorAll('.star');
  siblings.forEach(s => { s.textContent = parseInt(s.dataset.value) <= val ? '★' : '☆'; s.style.color = parseInt(s.dataset.value) <= val ? 'var(--sev-medium)' : 'var(--text-muted)'; });
}
function resetStars(el) {
  const pm = el.parentElement.dataset.pm;
  const selected = parseInt(document.getElementById('fb-accuracy-' + pm).value) || 0;
  el.parentElement.querySelectorAll('.star').forEach(s => { s.textContent = parseInt(s.dataset.value) <= selected ? '★' : '☆'; s.style.color = parseInt(s.dataset.value) <= selected ? 'var(--sev-medium)' : 'var(--text-muted)'; });
}
function selectStar(el) {
  const val = parseInt(el.dataset.value);
  const pm = el.parentElement.dataset.pm;
  document.getElementById('fb-accuracy-' + pm).value = val;
  previewStars(el);
}

async function submitFeedback(name, ns) {
  const accuracy = parseInt(document.getElementById('fb-accuracy-' + name).value) || 0;
  const author = (document.getElementById('fb-author-' + name).value || '').trim();
  const rootCause = (document.getElementById('fb-rootcause-' + name).value || '').trim();
  const comments = (document.getElementById('fb-comments-' + name).value || '').trim();

  if (!author) { toast('Please provide your name', 'error'); return; }
  if (accuracy < 1 || accuracy > 5) { toast('Please rate the remediation accuracy (1-5 stars)', 'error'); return; }

  try {
    await apiPost(`/postmortems/${name}/feedback?namespace=${encodeURIComponent(ns)}`, {
      overrideRootCause: rootCause,
      remediationAccuracy: accuracy,
      comments: comments,
      providedBy: author
    });
    toast(`Feedback submitted for ${name}`, 'success');
    loadPostMortems();
  } catch (e) {
    toast(`Failed to submit feedback: ${e.message}`, 'error');
  }
}

          <div style="width:${rate}%; background:${barColor}; height:100%; border-radius:4px; transition:width 0.3s;"></div>
        </div>
        <span style="min-width:40px; text-align:right; font-size:0.75rem; font-weight:600; color:${barColor}">${rate}%</span>
        <span style="min-width:30px; text-align:right; font-size:0.7rem; color:var(--text-dim)">(${s.total || 0})</span>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<p style="color:var(--text-muted); font-size:0.8rem">Stats unavailable</p>';
  }
}

// Enhancement #5: Federation panel in Clusters tab
async function loadFederationPanel() {
  const el = $('#federationPanel');
  if (!el) return;
  try {
    const [statusData, corrData] = await Promise.all([
      apiFetch('/federation/status').catch(() => null),
      apiFetch('/federation/correlations').catch(() => null)
    ]);
    const status = statusData ? (statusData.spec || {}) : null;
    const correlations = corrData ? (corrData.items || []) : [];
    if (!status && correlations.length === 0) { el.innerHTML = ''; return; }

    let html = '<div class="panel" style="margin-bottom:1rem;"><div class="panel-header"><span class="panel-title">Federation</span></div><div class="panel-body">';
    if (status) {
      html += `<div class="stats-grid" style="margin-bottom:0.5rem;">
        <div class="stat-card"><div class="stat-label">Connected</div><div class="stat-value" style="color:var(--sev-low)">${status.connectedClusters || 0}</div></div>
        <div class="stat-card"><div class="stat-label">Disconnected</div><div class="stat-value" style="color:var(--sev-critical)">${status.disconnectedClusters || 0}</div></div>
        <div class="stat-card"><div class="stat-label">Active Issues</div><div class="stat-value" style="color:var(--warning)">${status.totalActiveIssues || 0}</div></div>
      </div>`;
    }
    if (correlations.length > 0) {
      html += `<h4 style="margin:0.5rem 0 0.3rem; font-size:0.85rem;">Cross-Cluster Correlations (${correlations.length})</h4>`;
      html += correlations.map(c => `
        <div style="padding:0.3rem 0; border-bottom:1px solid var(--border); font-size:0.8rem;">
          ${severityBadge(c.severity || 'low')}
          <strong>${escapeHtml(c.issue || '-')}</strong>
          <span style="color:var(--text-muted)">— ${escapeHtml(c.signalType || '-')}</span>
          ${c.cascade ? '<span style="color:var(--sev-critical); font-size:0.7rem; margin-left:0.3rem">CASCADE</span>' : ''}
          ${c.elevated ? '<span style="color:var(--sev-high); font-size:0.7rem; margin-left:0.3rem">ELEVATED</span>' : ''}
          ${c.correlatedClusters ? `<span style="color:var(--text-dim); font-size:0.7rem; margin-left:0.3rem">${escapeHtml(c.correlatedClusters)}</span>` : ''}
        </div>`).join('');
    }
    html += '</div></div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '';
  }
}

// Call remediation strategy chart from Overview
(function() {
  const origLoadOverview = loadOverview;
  loadOverview = async function() {
    await origLoadOverview();
    loadRemediationStrategyChart();
  };
})();

// ===== CLUSTERS PAGE =====

async function loadClusters() {
  const summaryEl = $('#clusterSummary');
  const cardsEl = $('#clusterCards');
  showLoading(cardsEl);
  loadFederationPanel();
  try {
    const data = await apiFetch('/clusters/global-status');
    const status = data.spec || {};
    summaryEl.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Clusters</div>
        <div class="stat-value">${status.totalClusters || 0}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Healthy</div>
        <div class="stat-value" style="color:var(--sev-low)">${status.healthyClusters || 0}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Degraded</div>
        <div class="stat-value" style="color:var(--sev-medium)">${status.degradedClusters || 0}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Offline</div>
        <div class="stat-value" style="color:var(--sev-critical)">${status.offlineClusters || 0}</div>
      </div>
    `;
    const clusters = status.clusters || [];
    if (clusters.length === 0) { showEmpty(cardsEl, 'No clusters registered'); return; }
    cardsEl.innerHTML = clusters.map(c => {
      const connState = c.connected ? 'Healthy' : 'Offline';
      return `
        <div class="cluster-card">
          <div class="cluster-card-header">
            <span class="cluster-name">${escapeHtml(c.displayName || c.name)}</span>
            ${stateBadge(connState)}
          </div>
          <div class="cluster-detail"><b>Region:</b> ${escapeHtml(c.region || '-')}</div>
          <div class="cluster-detail"><b>Environment:</b> ${escapeHtml(c.environment || '-')}</div>
          <div class="cluster-detail"><b>Tier:</b> ${escapeHtml(c.tier || '-')}</div>
          <div class="cluster-detail"><b>Nodes:</b> ${c.nodeCount || '-'}</div>
          <div class="cluster-detail"><b>Namespaces:</b> ${c.namespaceCount || '-'}</div>
          <div class="cluster-detail"><b>Version:</b> ${escapeHtml(c.version || '-')}</div>
          <div class="cluster-detail"><b>Active Issues:</b> ${c.activeIssues || 0}</div>
          <div class="cluster-detail"><b>Active Remediations:</b> ${c.activeRemediations || 0}</div>
          ${c.lastHealthCheck ? `<div class="cluster-detail"><b>Last Health Check:</b> ${timeAgo(c.lastHealthCheck)}</div>` : ''}
        </div>
      `;
    }).join('');
  } catch (e) {
    summaryEl.innerHTML = '';
    showError(cardsEl, 'Failed to load clusters: ' + e.message, 'loadClusters()');
  }
}

function getClusterStateClass(state) {
  const s = (state || '').toLowerCase();
  if (['healthy', 'connected', 'ready'].includes(s)) return 'state-healthy';
  if (['degraded', 'warning'].includes(s)) return 'state-acknowledged';
  return 'state-unknown';
}

// ===== AUDIT PAGE =====

async function loadAudit() {
  const el = $('#auditTableBody');
  showLoading(el);
  const search = $('#auditSearch').value;
  const type = $('#auditTypeFilter').value;
  const sev = $('#auditSevFilter').value;
  let q = '?pageSize=100';
  if (type) q += '&type=' + encodeURIComponent(type);
  if (sev) q += '&severity=' + encodeURIComponent(sev);
  try {
    const data = await apiFetch('/audit' + q + getTimeRangeQuery());
    let items = (data.items || []).sort((a, b) => (b.timestamp || b.creationTimestamp || '').localeCompare(a.timestamp || a.creationTimestamp || ''));
    const total = (data.metadata || {}).totalCount || items.length;

    // Client-side search filter
    if (search) {
      const s = search.toLowerCase();
      items = items.filter(i =>
        (i.name || '').toLowerCase().includes(s) ||
        (i.detail || '').toLowerCase().includes(s) ||
        (i.eventType || '').toLowerCase().includes(s) ||
        (i.resourceName || '').toLowerCase().includes(s) ||
        (i.resourceKind || '').toLowerCase().includes(s) ||
        (i.actorName || '').toLowerCase().includes(s) ||
        (i.correlationId || '').toLowerCase().includes(s)
      );
    }

    $('#auditCount').textContent = `${items.length} event(s)` + (items.length !== total ? ` of ${total}` : '');
    if (items.length === 0) { showEmpty(el, 'No audit events found'); return; }
    el.innerHTML = `<table>
      <thead><tr>
        <th>Timestamp</th><th>Event Type</th><th>Severity</th><th>Actor</th><th>Resource</th><th>Correlation</th><th>Detail</th>
      </tr></thead>
      <tbody>
        ${items.map(i => `<tr>
          <td style="white-space:nowrap" data-sort-value="${new Date(i.timestamp || i.creationTimestamp || 0).getTime()}">${i.timestamp ? new Date(i.timestamp).toLocaleString() : timeAgo(i.creationTimestamp)}</td>
          <td>${escapeHtml(i.eventType || '-')}</td>
          <td>${i.severity ? severityBadge(i.severity) : '-'}</td>
          <td>${escapeHtml(i.actorName || '-')}${i.actorType ? ' <small>(' + escapeHtml(i.actorType) + ')</small>' : ''}</td>
          <td>${resourceKindBadge(i.resourceKind)} ${i.resourceName ? escapeHtml(i.resourceName) : '-'}${i.resourceNamespace ? ' <small>(' + escapeHtml(i.resourceNamespace) + ')</small>' : ''}</td>
          <td>${escapeHtml(i.correlationId || '-')}</td>
          <td style="max-width:300px; overflow:hidden; text-overflow:ellipsis;" title="${escapeHtml(i.detail || '')}">${escapeHtml(i.detail || '-')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
    makeSortable(el.querySelector('table'));
  } catch (e) {
    showError(el, 'Failed to load audit events: ' + e.message, 'loadAudit()');
  }
}

async function exportAudit() {
  const type = $('#auditTypeFilter').value;
  const sev = $('#auditSevFilter').value;
  let q = '?';
  if (type) q += 'type=' + encodeURIComponent(type) + '&';
  if (sev) q += 'severity=' + encodeURIComponent(sev) + '&';
  try {
    const res = await fetch(API + '/audit/export' + q);
    if (!res.ok) throw new Error(res.statusText);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `audit-events-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Audit events exported', 'success');
  } catch (e) {
    toast('Failed to export: ' + e.message, 'error');
  }
}

// ===== PENDING APPROVALS BADGE (polled) =====

async function updateApprovalBadge() {
  try {
    const data = await apiFetch('/approvals?state=Pending&pageSize=1');
    const total = (data.metadata || {}).totalCount || (data.items || []).length;
    const badge = $('#approvalBadge');
    if (total > 0) {
      badge.style.display = '';
      badge.textContent = total;
    } else {
      badge.style.display = 'none';
    }
  } catch { /* ignore */ }
}

  checkHealth();

  $('#auditSearch').addEventListener('input', () => {
    clearTimeout(auditTimeout);
    auditTimeout = setTimeout(() => { if (currentTab === 'audit') loadAudit(); }, 400);
  });
});
