---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: runbooks.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: Runbook
    listKind: RunbookList
    plural: runbooks
    shortNames:
    - rb
    singular: runbook
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.trigger.signalType
      name: Signal
      type: string
    - jsonPath: .spec.trigger.severity
      name: Severity
      type: string
    - jsonPath: .spec.trigger.resourceKind
      name: ResourceKind
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Runbook defines operational procedures linked to issue types.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RunbookSpec defines the desired state of a Runbook.
            properties:
              description:
                description: Description explains the purpose of this runbook.
                type: string
              maxAttempts:
                default: 3
                description: MaxAttempts is the maximum number of remediation attempts.
                format: int32
                type: integer
              steps:
                description: Steps are the operational steps to follow.
                items:
                  description: RunbookStep defines a single operational step.
                  properties:
                    action:
                      description: Action to execute (e.g., CheckRecentRollout, ScaleDeployment,
                        RollbackDeployment).
                      type: string
                    description:
                      description: Description explains why this step is needed and
                        what it does.
                      type: string
                    name:
                      description: Name of the step.
                      type: string
                    params:
                      additionalProperties:
                        type: string
                      description: Params are optional key-value parameters for the
                        action.
                      type: object
                  required:
                  - action
                  - name
                  type: object
                type: array
              trigger:
                description: Trigger defines when this runbook should be activated.
                properties:
                  resourceKind:
                    description: ResourceKind is the kind of resource this runbook
                      applies to.
                    type: string
                  severity:
                    description: Severity that triggers this runbook.
                    enum:
                    - critical
                    - high
                    - medium
                    - low
                    type: string
                  signalType:
                    description: SignalType that triggers this runbook.
                    enum:
