---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: instances.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: Instance
    listKind: InstanceList
    plural: instances
    shortNames:
    - inst
    singular: instance
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Instance is the Schema for the instances API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InstanceSpec defines the desired state of a ChatCLI deployment.
            properties:
              agents:
                description: Agents configures agent/skill provisioning for the instance.
                properties:
                  configMapRef:
                    description: ConfigMapRef references a ConfigMap containing agent
                      .md files as keys.
                    type: string
                  skillsConfigMapRef:
                    description: SkillsConfigMapRef references a ConfigMap containing
                      skill .md files.
                    type: string
                type: object
              aiops:
                description: |-
                  AIOps configures the autonomous incident management pipeline.
                  All fields are optional with sensible defaults.
                properties:
                  agenticMaxSteps:
                    default: 10
                    description: |-
                      AgenticMaxSteps is the maximum number of steps the AI can take in agentic
                      remediation mode before forced failure. Higher values give the AI more room
                      to investigate and try different approaches.
                    format: int32
                    maximum: 30
                    minimum: 3
                    type: integer
                  dedupTTLMinutes:
                    default: 60
                    description: |-
                      DedupTTLMinutes is how long (in minutes) the bridge dedup cache retains alert hashes.
                      After this period, the same alert can create a new Anomaly CR.
                    format: int32
                    maximum: 1440
                    minimum: 5
                    type: integer
                  enableAutoResolve:
                    default: true
                    description: |-
                      EnableAutoResolve enables automatic resolution of Escalated issues when the
                      watcher detects the resource has recovered (all pods healthy).
                    type: boolean
                  maxRemediationAttempts:
                    default: 5
                    description: |-
                      MaxRemediationAttempts is the maximum number of remediation attempts before escalating to human.
                      Higher values give the AI more chances to try different strategies.
                    format: int32
                    maximum: 10
                    minimum: 1
                    type: integer
                  resolutionCooldownMinutes:
                    default: 10
                    description: |-
                      ResolutionCooldownMinutes is how long (in minutes) after an issue is resolved before
                      new anomalies for the same resource can create a new issue. Prevents stale re-triggers.
                    format: int32
                    maximum: 120
                    minimum: 0
                    type: integer
                type: object
              apiKeys:
                description: |-
                  APIKeys references a Secret containing provider API keys and config.
                  Expected keys: OPENAI_API_KEY, ANTHROPIC_API_KEY, GOOGLEAI_API_KEY, XAI_API_KEY,
                  ZAI_API_KEY, MINIMAX_API_KEY, MINIMAX_API_COMPAT, GITHUB_COPILOT_TOKEN, etc.
                  All providers used in the fallback chain must have their API keys in this Secret.
                properties:
                  name:
                    description: Name is the Secret name.
                    type: string
                required:
                - name
                type: object
              fallback:
                description: |-
                  Fallback configures automatic provider failover.
                  When the primary provider fails (rate limit, timeout, server error),
                  the system tries the next provider in the chain automatically.
                properties:
                  cooldownBase:
                    default: 30s
                    description: |-
                      CooldownBase is the initial cooldown duration after a provider fails (e.g., "30s").
                      Subsequent failures use exponential backoff up to CooldownMax.
                    type: string
                  cooldownMax:
                    default: 5m
                    description: CooldownMax is the maximum cooldown duration (e.g.,
                      "5m").
                    type: string
                  enabled:
                    description: Enabled activates the fallback chain.
                    type: boolean
                  maxRetries:
                    default: 2
                    description: MaxRetries is the number of retries per provider
                      before moving to next.
                    format: int32
                    minimum: 0
                    type: integer
                  providers:
                    description: |-
                      Providers is an ordered list of fallback providers to try.
                      First entry is highest priority. The primary provider (spec.provider)
                      is always tried first, then these in order.
                    items:
                      description: FallbackProviderEntry defines a single provider
                        in the fallback chain.
                      properties:
                        model:
                          description: Model is the LLM model to use for this provider.
                          type: string
                        name:
                          description: Name is the provider name (OPENAI, OPENAI_ASSISTANT,
                            CLAUDEAI, GOOGLEAI, XAI, ZAI, MINIMAX, STACKSPOT, OLLAMA,
                            COPILOT, GITHUB_MODELS).
                          enum:
                          - OPENAI
                          - OPENAI_ASSISTANT
                          - CLAUDEAI
                          - GOOGLEAI
                          - XAI
                          - ZAI
                          - MINIMAX
                          - STACKSPOT
                          - OLLAMA
                          - COPILOT
                          - GITHUB_MODELS
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                required:
                - enabled
                - providers
                type: object
              image:
                description: Image defines the container image for ChatCLI.
                properties:
                  pullPolicy:
                    default: IfNotPresent
                    description: PullPolicy defines the image pull policy.
                    type: string
                  repository:
                    default: ghcr.io/diillson/chatcli
                    description: Repository is the container image repository.
                    type: string
                  tag:
                    default: latest
                    description: Tag is the container image tag.
                    type: string
                type: object
              mcp:
                description: |-
                  MCP configures MCP (Model Context Protocol) servers for the instance.
                  MCP servers expose external tools (filesystem, search, databases, etc.)
                  that the AI can invoke during conversations.
                properties:
                  enabled:
                    default: false
                    description: Enabled activates MCP server connections.
                    type: boolean
                  existingConfigMap:
                    description: |-
                      ExistingConfigMap references an existing ConfigMap containing mcp_servers.json.
                      If set, Servers field is ignored and this ConfigMap is mounted instead.
                    type: string
                  servers:
                    description: Servers is the list of MCP server configurations.
                    items:
                      description: MCPServerSpec defines a single MCP server connection.
                      properties:
                        args:
                          description: Args are command-line arguments for the executable
                            (stdio transport only).
                          items:
                            type: string
                          type: array
                        command:
                          description: Command is the executable to start (stdio transport
                            only).
                          type: string
                        enabled:
                          default: true
                          description: Enabled controls whether this server is active.
                          type: boolean
                        env:
                          additionalProperties:
                            type: string
                          description: Env are environment variables for the process
                            (stdio transport only).
                          type: object
                        name:
                          description: Name is a unique identifier for this MCP server.
                          type: string
                        overrides:
                          description: |-
                            Overrides lists built-in plugin names that this MCP server replaces.
                            When the server is connected, these built-ins are hidden from the LLM prompt.
                            If the server disconnects, the built-ins are automatically restored (fallback).
                            Example: ["@webfetch", "@websearch"]
                          items:
                            type: string
                          type: array
                        transport:
                          description: 'Transport is the communication protocol: "stdio"
                            (local process) or "sse" (HTTP SSE).'
                          enum:
                          - stdio
                          - sse
                          type: string
                        url:
                          description: URL is the SSE endpoint URL (sse transport
                            only).
                          type: string
                      required:
                      - enabled
                      - name
                      - transport
                      type: object
                    type: array
                required:
                - enabled
                type: object
              model:
                description: Model is the LLM model name.
                type: string
              persistence:
                description: Persistence configures persistent storage for sessions.
                properties:
                  enabled:
                    description: Enabled activates persistent storage.
                    type: boolean
                  size:
                    default: 1Gi
                    description: Size is the PVC size (e.g., "1Gi").
                    type: string
                  storageClassName:
                    description: StorageClassName is the storage class to use.
                    type: string
                type: object
              plugins:
                description: Plugins configures plugin provisioning for the instance.
                properties:
                  image:
                    description: Image is an init container image containing plugin
                      binaries in /plugins/.
                    type: string
                  pvcName:
                    description: PVCName references a PVC with pre-installed plugin
                      binaries.
                    type: string
                type: object
              provider:
                description: Provider is the LLM provider (OPENAI, OPENAI_ASSISTANT,
                  CLAUDEAI, GOOGLEAI, XAI, ZAI, MINIMAX, STACKSPOT, OLLAMA, COPILOT,
                  GITHUB_MODELS).
                type: string
              replicas:
                default: 1
                description: Replicas is the number of ChatCLI server pods.
                format: int32
                minimum: 0
                type: integer
              resources:
                description: Resources defines resource requests/limits for the ChatCLI
                  container.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              securityContext:
                description: SecurityContext for the pod.
                properties:
                  appArmorProfile:
                    description: |-
                      appArmorProfile is the AppArmor options to use by the containers in this pod.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile loaded on the node that should be used.
                          The profile must be preconfigured on the node to work.
                          Must match the loaded name of the profile.
                          Must be set if and only if type is "Localhost".
                        type: string
                      type:
                        description: |-
                          type indicates which kind of AppArmor profile will be applied.
                          Valid options are:
                            Localhost - a profile pre-loaded on the node.
                            RuntimeDefault - the container runtime's default profile.
                            Unconfined - no AppArmor enforcement.
                        type: string
                    required:
                    - type
                    type: object
                  fsGroup:
                    description: |-
                      A special supplemental group that applies to all containers in a pod.
                      Some volume types allow the Kubelet to change the ownership of that volume
                      to be owned by the pod:

                      1. The owning GID will be the FSGroup
                      2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
                      3. The permission bits are OR'd with rw-rw----

                      If unset, the Kubelet will not modify the ownership and permissions of any volume.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  fsGroupChangePolicy:
                    description: |-
                      fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
                      before being exposed inside Pod. This field will only apply to
                      volume types which support fsGroup based ownership(and permissions).
                      It will have no effect on ephemeral volume types such as: secret, configmaps
                      and emptydir.
                      Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  runAsGroup:
                    description: |-
                      The GID to run the entrypoint of the container process.
                      Uses runtime default if unset.
                      May also be set in SecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence
                      for that container.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  runAsNonRoot:
                    description: |-
                      Indicates that the container must run as a non-root user.
                      If true, the Kubelet will validate the image at runtime to ensure that it
                      does not run as UID 0 (root) and fail to start the container if it does.
                      If unset or false, no such validation will be performed.
                      May also be set in SecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence.
                    type: boolean
                  runAsUser:
                    description: |-
                      The UID to run the entrypoint of the container process.
                      Defaults to user specified in image metadata if unspecified.
                      May also be set in SecurityContext.  If set in both SecurityContext and
                      PodSecurityContext, the value specified in SecurityContext takes precedence
                      for that container.
                      Note that this field cannot be set when spec.os.name is windows.
                    format: int64
                    type: integer
                  seLinuxChangePolicy:
                    description: |-
                      seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
                      It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
                      Valid values are "MountOption" and "Recursive".

                      "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
                      This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

                      "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
                      This requires all Pods that share the same volume to use the same SELinux label.
                      It is not possible to share the same volume among privileged and unprivileged Pods.
                      Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
                      whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
                      CSIDriver instance. Other volumes are always re-labelled recursively.
                      "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

                      If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
                      If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
                      and "Recursive" for all other volumes.

                      This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

                      All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  seLinuxOptions:
                    description: |-
                      The SELinux context to be applied to all containers.
                      If unspecified, the container runtime will allocate a random SELinux context for each
                      container.  May also be set in SecurityContext.  If set in
                      both SecurityContext and PodSecurityContext, the value specified in SecurityContext
                      takes precedence for that container.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      level:
                        description: Level is SELinux level label that applies to
                          the container.
                        type: string
                      role:
                        description: Role is a SELinux role label that applies to
                          the container.
                        type: string
                      type:
                        description: Type is a SELinux type label that applies to
                          the container.
                        type: string
                      user:
                        description: User is a SELinux user label that applies to
                          the container.
                        type: string
                    type: object
                  seccompProfile:
                    description: |-
                      The seccomp options to use by the containers in this pod.
                      Note that this field cannot be set when spec.os.name is windows.
                    properties:
                      localhostProfile:
                        description: |-
                          localhostProfile indicates a profile defined in a file on the node should be used.
                          The profile must be preconfigured on the node to work.
                          Must be a descending path, relative to the kubelet's configured seccomp profile location.
                          Must be set if type is "Localhost". Must NOT be set for any other type.
                        type: string
                      type:
                        description: |-
                          type indicates which kind of seccomp profile will be applied.
                          Valid options are:

                          Localhost - a profile defined in a file on the node should be used.
                          RuntimeDefault - the container runtime default profile should be used.
                          Unconfined - no profile should be applied.
                        type: string
                    required:
                    - type
                    type: object
                  supplementalGroups:
                    description: |-
                      A list of groups applied to the first process run in each container, in
                      addition to the container's primary GID and fsGroup (if specified).  If
                      the SupplementalGroupsPolicy feature is enabled, the
                      supplementalGroupsPolicy field determines whether these are in addition
                      to or instead of any group memberships defined in the container image.
                      If unspecified, no additional groups are added, though group memberships
                      defined in the container image may still be used, depending on the
                      supplementalGroupsPolicy field.
                      Note that this field cannot be set when spec.os.name is windows.
                    items:
                      format: int64
                      type: integer
                    type: array
                    x-kubernetes-list-type: atomic
                  supplementalGroupsPolicy:
                    description: |-
                      Defines how supplemental groups of the first container processes are calculated.
                      Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
                      (Alpha) Using the field requires the SupplementalGroupsPolicy feature gate to be enabled
                      and the container runtime must implement support for this feature.
                      Note that this field cannot be set when spec.os.name is windows.
                    type: string
                  sysctls:
                    description: |-
                      Sysctls hold a list of namespaced sysctls used for the pod. Pods with unsupported
                      sysctls (by the container runtime) might fail to launch.
                      Note that this field cannot be set when spec.os.name is windows.
                    items:
                      description: Sysctl defines a kernel parameter to be set
                      properties:
                        name:
                          description: Name of a property to set
                          type: string
                        value:
                          description: Value of a property to set
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  windowsOptions:
                    description: |-
                      The Windows specific settings applied to all containers.
                      If unspecified, the options within a container's SecurityContext will be used.
                      If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                      Note that this field cannot be set when spec.os.name is linux.
                    properties:
                      gmsaCredentialSpec:
                        description: |-
                          GMSACredentialSpec is where the GMSA admission webhook
                          (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
                          GMSA credential spec named by the GMSACredentialSpecName field.
                        type: string
                      gmsaCredentialSpecName:
                        description: GMSACredentialSpecName is the name of the GMSA
                          credential spec to use.
                        type: string
                      hostProcess:
                        description: |-
                          HostProcess determines if a container should be run as a 'Host Process' container.
                          All of a Pod's containers must have the same effective HostProcess value
                          (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
                          In addition, if HostProcess is true then HostNetwork must also be set to true.
                        type: boolean
                      runAsUserName:
                        description: |-
                          The UserName in Windows to run the entrypoint of the container process.
                          Defaults to the user specified in image metadata if unspecified.
                          May also be set in PodSecurityContext. If set in both SecurityContext and
                          PodSecurityContext, the value specified in SecurityContext takes precedence.
                        type: string
                    type: object
                type: object
              server:
                description: Server configures the gRPC server.
                properties:
                  metricsPort:
                    default: 9090
                    description: MetricsPort is the Prometheus metrics HTTP port (0
                      = disabled).
                    format: int32
                    type: integer
                  port:
                    default: 50051
                    description: Port is the gRPC server port.
                    format: int32
                    type: integer
                  tls:
                    description: TLS configures TLS for the gRPC server.
                    properties:
                      enabled:
                        description: Enabled enables TLS.
                        type: boolean
                      secretName:
                        description: SecretName is the name of the Secret containing
                          tls.crt and tls.key.
                        type: string
                    type: object
                  token:
                    description: Token references a Secret containing the auth token.
                    properties:
                      key:
                        description: Key is the key within the Secret.
                        type: string
                      name:
                        description: Name is the Secret name.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                type: object
              watcher:
                description: Watcher configures the Kubernetes resource watcher.
                properties:
                  deployment:
                    description: Deployment is the target deployment to watch (legacy
                      single-target mode).
                    type: string
                  enabled:
                    description: Enabled activates the watcher.
                    type: boolean
                  interval:
                    default: 30s
                    description: Interval is the collection interval (e.g., "30s",
                      "1m").
                    type: string
                  maxContextChars:
                    default: 32000
                    description: MaxContextChars is the maximum characters for LLM
                      context budget.
                    format: int32
                    type: integer
                  maxLogLines:
                    default: 100
                    description: MaxLogLines is the maximum number of log lines to
                      collect per pod.
                    format: int32
                    type: integer
                  namespace:
                    description: Namespace is the namespace of the target deployment
                      (legacy single-target mode).
                    type: string
                  targets:
                    description: |-
                      Targets defines multiple deployments to watch simultaneously.
                      When set, Deployment and Namespace fields are ignored.
                    items:
                      description: WatchTargetSpec defines a single resource target
                        for multi-target watching.
                      properties:
                        deployment:
                          description: |-
                            Deployment is the resource name to monitor.
                            Deprecated: Use "name" instead. Kept for backward compatibility — if both are set, "name" takes precedence.
                          type: string
                        kind:
                          default: Deployment
                          description: |-
                            Kind is the Kubernetes resource kind to monitor.
                            Supported values: Deployment, StatefulSet, DaemonSet, Job, CronJob.
                            Defaults to "Deployment" when omitted for backward compatibility.
                          enum:
                          - Deployment
                          - StatefulSet
                          - DaemonSet
                          - Job
                          - CronJob
                          type: string
                        metricsFilter:
                          description: MetricsFilter is a list of glob patterns to
                            filter Prometheus metrics.
                          items:
                            type: string
                          type: array
                        metricsPath:
                          description: 'MetricsPath is the HTTP path for Prometheus
                            metrics (default: "/metrics").'
                          type: string
                        metricsPort:
                          description: MetricsPort is the port where Prometheus metrics
                            are exposed (0 = disabled).
                          format: int32
                          type: integer
                        name:
                          description: Name is the resource name to monitor (e.g.,
                            "api-gateway", "postgres", "fluentd").
                          type: string
                        namespace:
                          description: Namespace is the namespace of the resource.
                          type: string
                      required:
                      - namespace
                      type: object
                    type: array
                  window:
                    default: 2h
                    description: Window is the observation window (e.g., "2h", "30m").
                    type: string
                type: object
            required:
            - provider
            type: object
          status:
            description: InstanceStatus defines the observed state of Instance.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the instance state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
