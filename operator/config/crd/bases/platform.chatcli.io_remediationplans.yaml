                    type: string
                  containerImages:
                    additionalProperties:
                      type: string
                    description: ContainerImages maps container name to image before
                      modification.
                    type: object
                  containerResources:
                    additionalProperties:
                      description: ContainerResourceSnapshot captures a single container's
                        resource requests/limits.
                      properties:
                        cpuLimit:
                          description: CPULimit before modification.
                          type: string
                        cpuRequest:
                          description: CPURequest before modification.
                          type: string
                        memoryLimit:
                          description: MemoryLimit before modification.
                          type: string
                        memoryRequest:
                          description: MemoryRequest before modification.
                          type: string
                      type: object
                    description: ContainerResources maps container name to its resources
                      before modification.
                    type: object
                  failedJobsHistoryLimit:
                    description: FailedJobsHistoryLimit captures history limit.
                    format: int32
                    type: integer
                  fullSpec:
                    description: FullSpec stores a JSON-serialized copy of the full
                      spec for complex rollbacks.
                    type: string
                  hpaMaxReplicas:
                    format: int32
                    type: integer
                  hpaMinReplicas:
                    description: HPASpec captures HPA state before modification.
                    format: int32
                    type: integer
                  maxUnavailable:
                    description: MaxUnavailable captures DaemonSet maxUnavailable
                      value.
                    type: string
                  namespace:
                    description: Namespace of the resource.
                    type: string
                  nodeUnschedulable:
                    description: NodeUnschedulable captures the node's schedulable
                      state before cordon.
                    type: boolean
                  parallelism:
                    description: Parallelism captures job parallelism before modification.
                    format: int32
                    type: integer
                  partition:
                    description: Partition captures StatefulSet partition value.
                    format: int32
                    type: integer
                  replicas:
                    description: Replicas before modification.
                    format: int32
                    type: integer
                  resourceKind:
                    description: ResourceKind is the kind of resource (Deployment,
                      StatefulSet, etc.).
                    type: string
                  resourceName:
                    description: ResourceName is the name of the resource.
                    type: string
                  schedule:
                    description: Schedule captures cron schedule before modification.
                    type: string
                  startingDeadlineSeconds:
                    description: StartingDeadlineSeconds captures cronjob deadline.
                    format: int64
                    type: integer
                  successfulJobsHistoryLimit:
                    description: SuccessfulJobsHistoryLimit captures history limit.
                    format: int32
                    type: integer
                  suspend:
                    description: Suspend captures the suspend state (Job, CronJob).
                    type: boolean
                  updateStrategyType:
                    description: UpdateStrategyType captures StatefulSet/DaemonSet
                      update strategy type.
                    type: string
                required:
                - capturedAt
                - namespace
                - resourceKind
                - resourceName
                type: object
              result:
                description: Result describes the outcome.
                type: string
              rollbackPerformed:
                description: RollbackPerformed indicates whether an automatic rollback
                  was executed.
                type: boolean
              rollbackResult:
                description: RollbackResult describes the outcome of the automatic
                  rollback.
                type: string
              startedAt:
                description: StartedAt is when execution began.
                format: date-time
                type: string
              state:
                description: State of the remediation plan execution.
                enum:
                - Pending
                - WaitingApproval
                - Executing
                - Verifying
                - Completed
                - Failed
                - RolledBack
