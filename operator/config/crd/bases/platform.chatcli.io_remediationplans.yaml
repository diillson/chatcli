                    success:
                      description: Success indicates whether this action succeeded.
                      type: boolean
                    timestamp:
                      description: Timestamp of execution.
                      format: date-time
                      type: string
                  required:
                  - actionIndex
                  - actionType
                  - success
                  - timestamp
                  type: object
                type: array
              actionsCompletedAt:
                description: ActionsCompletedAt is when all actions finished executing
                  and verification began.
                format: date-time
                type: string
              agenticStartedAt:
                description: AgenticStartedAt is when the agentic loop first started.
                format: date-time
                type: string
              agenticStepCount:
                description: AgenticStepCount is the number of agentic steps completed.
                format: int32
                type: integer
              completedAt:
                description: CompletedAt is when execution finished (after verification).
                format: date-time
                type: string
              evidence:
                description: Evidence collected during execution.
                items:
                  description: EvidenceItem is a piece of evidence collected during
                    remediation.
                  properties:
                    data:
                      description: Data content.
                      type: string
                    timestamp:
                      description: Timestamp when collected.
                      format: date-time
                      type: string
                    type:
                      description: Type of evidence (log, metric_snapshot, event,
