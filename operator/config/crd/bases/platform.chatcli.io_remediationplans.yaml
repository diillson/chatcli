                          type: string
                      required:
                      - type
                      type: object
                    aiMessage:
                      description: AIMessage is the AI's reasoning for this step.
                      type: string
                    observation:
                      description: Observation is the result of executing the action.
                      type: string
                    stepNumber:
                      description: StepNumber is 1-based, incremented each reconcile
                        cycle.
                      format: int32
                      type: integer
                    timestamp:
                      description: Timestamp is when this step was recorded.
                      format: date-time
                      type: string
                  required:
                  - aiMessage
                  - stepNumber
                  - timestamp
                  type: object
                type: array
              agenticMaxSteps:
                default: 10
                description: AgenticMaxSteps is the maximum number of agentic steps
                  before forced failure.
                format: int32
                type: integer
              agenticMode:
                description: |-
                  AgenticMode enables AI-driven step-by-step remediation.
                  When true, Actions is ignored and the AI decides each step.
                type: boolean
              attempt:
                description: Attempt number (1-based).
                format: int32
                type: integer
              issueRef:
