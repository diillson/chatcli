apiVersion: v1
kind: Namespace
metadata:
  name: chatcli-system
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chatcli-operator
  namespace: chatcli-system
  labels:
    app.kubernetes.io/name: chatcli-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-operator-manager
rules:
  # Instance CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - instances
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - instances/status
      - instances/finalizers
    verbs:
      - get
      - update
      - patch
  # Issue CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - issues
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - issues/status
      - issues/finalizers
    verbs:
      - get
      - update
      - patch
  # RemediationPlan CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - remediationplans
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - remediationplans/status
    verbs:
      - get
      - update
      - patch
  # Anomaly CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - anomalies
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - anomalies/status
    verbs:
      - get
      - update
      - patch
  # Runbook CRD (controller creates auto-generated runbooks)
  - apiGroups:
      - platform.chatcli.io
    resources:
      - runbooks
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # SourceRepository CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - sourcerepositories
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - sourcerepositories/status
    verbs:
      - get
      - update
      - patch
  # NotificationPolicy, EscalationPolicy, ApprovalPolicy, ApprovalRequest, SLO, SLA, AuditEvent, ChaosExperiment, ClusterRegistration
  - apiGroups:
      - platform.chatcli.io
    resources:
      - notificationpolicies
      - escalationpolicies
      - approvalpolicies
      - approvalrequests
      - servicelevelobjectives
      - incidentslas
      - auditevents
      - chaosexperiments
      - clusterregistrations
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - notificationpolicies/status
      - escalationpolicies/status
      - approvalpolicies/status
      - approvalrequests/status
      - servicelevelobjectives/status
      - incidentslas/status
      - auditevents/status
      - chaosexperiments/status
      - clusterregistrations/status
    verbs:
      - get
      - update
      - patch
  # AIInsight CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - aiinsights
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - aiinsights/status
    verbs:
      - get
      - update
      - patch
  # PostMortem CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - postmortems
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - postmortems/status
    verbs:
      - get
      - update
      - patch
  # Owned resources (Instance controller)
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # ReplicaSets (for rollback inspection)
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch
  # Watcher read-only resources (needed to grant via ClusterRole)
  - apiGroups:
      - ""
    resources:
      - endpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Batch resources (Jobs, CronJobs) — full CRUD for AIOps remediation
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # ControllerRevisions (for StatefulSet/DaemonSet rollback)
  - apiGroups:
      - apps
    resources:
      - controllerrevisions
    verbs:
      - get
      - list
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Policy (PDB checks for blast radius)
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
  # Discovery (endpoint slices for dependency health)
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
  # Nodes (cordon/drain remediation)
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - services
      - serviceaccounts
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Secrets (API keys, TLS certs, auth tokens, RotateSecret + HelmRollback)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Pods and logs (watcher, remediation restart, pod deletion)
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
      - delete
  # ConfigMaps — no delete for remediation safety
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Security (H5): RBAC resources — read-only for monitoring.
  # Removed patch/delete/create on ClusterRoles and ClusterRoleBindings
  # to prevent privilege escalation if operator is compromised.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch
  # Events (emit + read for watcher)
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  # Namespaces (read for context)
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  # ArgoCD Applications (GitOps detection + sync)
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Flux Kustomizations (GitOps detection)
  - apiGroups:
      - kustomize.toolkit.fluxcd.io
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chatcli-operator-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chatcli-operator-manager
subjects:
  - kind: ServiceAccount
    name: chatcli-operator
    namespace: chatcli-system
