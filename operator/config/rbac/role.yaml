apiVersion: v1
kind: Namespace
metadata:
  name: chatcli-system
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chatcli-operator
  namespace: chatcli-system
  labels:
    app.kubernetes.io/name: chatcli-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-operator-manager
rules:
  # Instance CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - instances
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - instances/status
      - instances/finalizers
    verbs:
      - get
      - update
      - patch
  # Issue CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - issues
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - issues/status
      - issues/finalizers
    verbs:
      - get
      - update
      - patch
  # RemediationPlan CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - remediationplans
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - remediationplans/status
    verbs:
      - get
      - update
      - patch
  # Anomaly CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - anomalies
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - anomalies/status
    verbs:
      - get
      - update
      - patch
  # Runbook CRD (controller creates auto-generated runbooks)
  - apiGroups:
      - platform.chatcli.io
    resources:
      - runbooks
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # SourceRepository CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - sourcerepositories
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - sourcerepositories/status
    verbs:
      - get
      - update
      - patch
  # NotificationPolicy, EscalationPolicy, ApprovalPolicy, ApprovalRequest, SLO, SLA, AuditEvent, ChaosExperiment, ClusterRegistration
  - apiGroups:
      - platform.chatcli.io
    resources:
      - notificationpolicies
      - escalationpolicies
      - approvalpolicies
      - approvalrequests
      - servicelevelobjectives
      - incidentslas
      - auditevents
      - chaosexperiments
      - clusterregistrations
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - notificationpolicies/status
      - escalationpolicies/status
      - approvalpolicies/status
      - approvalrequests/status
      - servicelevelobjectives/status
      - incidentslas/status
      - auditevents/status
      - chaosexperiments/status
      - clusterregistrations/status
    verbs:
      - get
      - update
      - patch
  # AIInsight CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - aiinsights
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - aiinsights/status
    verbs:
      - get
      - update
      - patch
  # PostMortem CRD
  - apiGroups:
      - platform.chatcli.io
    resources:
      - postmortems
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - platform.chatcli.io
    resources:
      - postmortems/status
    verbs:
      - get
      - update
      - patch
  # Owned resources (Instance controller)
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # ReplicaSets (for rollback inspection)
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch
  # Watcher read-only resources (needed to grant via ClusterRole)
  - apiGroups:
      - ""
    resources:
      - endpoints
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Batch resources (Jobs, CronJobs) — full CRUD for AIOps remediation
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # ControllerRevisions (for StatefulSet/DaemonSet rollback)
  - apiGroups:
      - apps
    resources:
      - controllerrevisions
    verbs:
      - get
      - list
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Policy (PDB checks for blast radius)
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
  # Discovery (endpoint slices for dependency health)
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
      - watch
  # Nodes (cordon/drain remediation)
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - services
      - serviceaccounts
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Secrets (API keys, TLS certs, auth tokens, RotateSecret + HelmRollback)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Pods and logs (watcher, remediation restart, pod deletion)
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
      - delete
  # ConfigMaps — no delete for remediation safety
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Security (H5): RBAC resources — namespaced Role/RoleBinding writable (used by
  # reconcileNamespacedRBAC), ClusterRole read-only to prevent privilege escalation.
  # Shared ClusterRoles (chatcli-watcher, chatcli-role-*) are pre-provisioned below and
  # referenced by per-Instance ClusterRoleBindings via the "bind" verb.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
    verbs:
      - get
      - list
      - watch
  # "bind" is restricted to the whitelisted shared ClusterRoles. A compromised operator
  # cannot reference a more-privileged ClusterRole in a new ClusterRoleBinding.
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
    resourceNames:
      - chatcli-watcher
      - chatcli-role-viewer
      - chatcli-role-operator
      - chatcli-role-admin
      - chatcli-role-superadmin
    verbs:
      - bind
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Events (emit + read for watcher)
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  # Namespaces (read for context)
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  # ArgoCD Applications (GitOps detection + sync)
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  # Flux Kustomizations (GitOps detection)
  - apiGroups:
      - kustomize.toolkit.fluxcd.io
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chatcli-operator-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chatcli-operator-manager
subjects:
  - kind: ServiceAccount
    name: chatcli-operator
    namespace: chatcli-system
---
# Shared ClusterRole referenced by per-Instance ClusterRoleBindings when a Watcher spans
# multiple namespaces. Pre-provisioned so the operator never needs escalate/create rights
# on ClusterRoles (Security H5).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-watcher
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/component: watcher
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
# Platform role ClusterRoles (viewer / operator / admin / superadmin). Referenced by
# RoleBindings the operator creates when granting a user a platform role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-viewer
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - issues
      - anomalies
      - aiinsights
      - postmortems
      - auditevents
      - servicelevelobjectives
      - incidentslas
      - remediationplans
      - runbooks
      - approvalrequests
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-operator
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - issues
      - anomalies
      - aiinsights
      - postmortems
      - auditevents
      - servicelevelobjectives
      - incidentslas
      - remediationplans
      - runbooks
      - approvalrequests
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.chatcli.io"]
    resources: ["issues", "approvalrequests", "postmortems"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-admin
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - issues
      - anomalies
      - aiinsights
      - postmortems
      - auditevents
      - servicelevelobjectives
      - incidentslas
      - remediationplans
      - approvalrequests
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - runbooks
      - notificationpolicies
      - servicelevelobjectives
      - incidentslas
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-superadmin
  labels:
    app.kubernetes.io/name: chatcli-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - instances
      - issues
      - anomalies
      - aiinsights
      - remediationplans
      - runbooks
      - postmortems
      - sourcerepositories
      - notificationpolicies
      - escalationpolicies
      - approvalpolicies
      - approvalrequests
      - servicelevelobjectives
      - incidentslas
      - auditevents
      - chaosexperiments
      - clusterregistrations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - instances/status
      - issues/status
      - anomalies/status
      - aiinsights/status
      - remediationplans/status
      - postmortems/status
      - sourcerepositories/status
      - notificationpolicies/status
      - escalationpolicies/status
      - approvalpolicies/status
      - approvalrequests/status
      - servicelevelobjectives/status
      - incidentslas/status
      - auditevents/status
      - chaosexperiments/status
      - clusterregistrations/status
    verbs: ["get", "update", "patch"]
