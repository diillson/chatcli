# ChatCLI Server - Docker Compose for development
# Usage: docker compose up
version: "3.9"

services:
  chatcli-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatcli-server
    ports:
      - "50051:50051"
    environment:
      # Server config
      CHATCLI_SERVER_PORT: "50051"
      CHATCLI_SERVER_TOKEN: "${CHATCLI_SERVER_TOKEN:-}"  # Set for auth, leave empty for no auth

      # LLM Provider (configure at least one)
      LLM_PROVIDER: "${LLM_PROVIDER:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-}"
      GOOGLEAI_API_KEY: "${GOOGLEAI_API_KEY:-}"
      ZAI_API_KEY: "${ZAI_API_KEY:-}"
      ZAI_MODEL: "${ZAI_MODEL:-}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:-}"
      MINIMAX_MODEL: "${MINIMAX_MODEL:-}"
      MINIMAX_API_COMPAT: "${MINIMAX_API_COMPAT:-}"
      OLLAMA_ENABLED: "${OLLAMA_ENABLED:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-}"

      # GitHub Copilot
      GITHUB_COPILOT_TOKEN: "${GITHUB_COPILOT_TOKEN:-}"
      COPILOT_MODEL: "${COPILOT_MODEL:-}"

      # Provider fallback chain (comma-separated, e.g. "OPENAI,CLAUDEAI,GOOGLEAI")
      CHATCLI_FALLBACK_ENABLED: "${CHATCLI_FALLBACK_ENABLED:-}"
      CHATCLI_FALLBACK_PROVIDERS: "${CHATCLI_FALLBACK_PROVIDERS:-}"
      CHATCLI_FALLBACK_MAX_RETRIES: "${CHATCLI_FALLBACK_MAX_RETRIES:-2}"

      # MCP (Model Context Protocol)
      CHATCLI_MCP_ENABLED: "${CHATCLI_MCP_ENABLED:-}"
      CHATCLI_MCP_CONFIG: "${CHATCLI_MCP_CONFIG:-}"

      # Memory and bootstrap
      CHATCLI_MEMORY_ENABLED: "${CHATCLI_MEMORY_ENABLED:-}"
      CHATCLI_BOOTSTRAP_ENABLED: "${CHATCLI_BOOTSTRAP_ENABLED:-}"

      # Logging
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      # Persist sessions across restarts
      - chatcli-sessions:/home/chatcli/.chatcli/sessions
      # Mount plugins directory (optional)
      - chatcli-plugins:/home/chatcli/.chatcli/plugins
      # Persist memory across restarts
      - chatcli-memory:/home/chatcli/.chatcli/memory
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=100M
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

volumes:
  chatcli-sessions:
  chatcli-plugins:
  chatcli-memory:
