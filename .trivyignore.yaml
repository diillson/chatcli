vulnerabilities:
  # grpc-health-probe transitive dependency; the binary does not perform
  # JWE decryption, so the panic path is unreachable in this context.
  # Revisit when grpc-health-probe releases a version with go-jose >= v4.1.4.
  - id: CVE-2026-34986
    paths:
      - usr/local/bin/grpc-health-probe
    statement: >
      grpc-health-probe is a simple gRPC health-check client that never
      processes JWE tokens. The vulnerable code path in go-jose is not
      reachable from this binary.
