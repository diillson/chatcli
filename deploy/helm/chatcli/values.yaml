# ChatCLI Helm Chart - Default Values

replicaCount: 1

image:
  repository: ghcr.io/diillson/chatcli
  # tag defaults to Chart.appVersion when empty — ensures version consistency.
  # Override with --set image.tag=custom if needed.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# gRPC server configuration
server:
  port: 50051
  # Prometheus metrics HTTP port (0 = disabled)
  metricsPort: 9090
  # Authentication token for gRPC server (leave empty to disable auth)
  token: ""
  # Enable gRPC reflection for debugging
  grpcReflection: false

# TLS configuration
tls:
  enabled: false
  # certFile and keyFile are paths inside the container
  certFile: ""
  keyFile: ""
  # Use existing secret for TLS certificates
  existingSecret: ""

# LLM Provider configuration
llm:
  # Default provider: OPENAI, CLAUDEAI, GOOGLEAI, XAI, ZAI, MINIMAX, STACKSPOT, OLLAMA, COPILOT, OPENROUTER
  provider: ""
  model: ""

# Provider fallback chain — automatic failover between LLM providers
# When the primary provider fails (rate limit, timeout, server error),
# the system automatically tries the next provider in the chain.
fallback:
  enabled: false
  # Ordered list of providers to try (first = highest priority)
  # Each entry needs a corresponding API key in secrets section.
  providers: []
  #   - name: OPENAI
  #     model: gpt-4o
  #   - name: CLAUDEAI
  #     model: claude-sonnet-4-20250514
  #   - name: GOOGLEAI
  #     model: gemini-2.0-flash
  maxRetries: 2
  cooldownBase: "30s"
  cooldownMax: "5m"

# MCP (Model Context Protocol) server configuration
mcp:
  enabled: false
  # Inline MCP server config (creates ConfigMap automatically)
  # servers:
  #   - name: filesystem
  #     transport: stdio
  #     command: npx
  #     args: ["-y", "@anthropic/mcp-server-filesystem", "/workspace"]
  #     enabled: true
  #   - name: web-tools
  #     transport: sse
  #     url: "http://mcp-web:8080/sse"
  #     enabled: true
  #     # overrides: built-in plugins this MCP server replaces.
  #     # When connected, these built-ins are hidden from the LLM.
  #     # If the server disconnects, built-ins are restored automatically.
  #     overrides: ["@webfetch", "@websearch"]
  servers: []
  # Or reference an existing ConfigMap with mcp_servers.json
  existingConfigMap: ""

# Provider API keys (stored in a Secret)
# Set these values or use existingSecret
secrets:
  # Use an existing secret instead of creating one
  existingSecret: ""
  openaiApiKey: ""
  anthropicApiKey: ""
  googleaiApiKey: ""
  xaiApiKey: ""
  # ZAI (Zhipu AI)
  zaiApiKey: ""
  # MiniMax
  minimaxApiKey: ""
  minimaxApiCompat: ""  # Empty = native API, "anthropic" = Anthropic Messages API compat
  # StackSpot
  stackspotClientId: ""
  stackspotClientKey: ""
  stackspotRealm: ""
  stackspotAgentId: ""
  # GitHub Copilot
  githubCopilotToken: ""
  # OpenRouter
  openrouterApiKey: ""

# GitHub Copilot configuration (if using COPILOT provider)
# Authenticate via /auth login github-copilot (Device Flow OAuth)
# or set secrets.githubCopilotToken above
copilot:
  model: ""           # e.g., gpt-4o, gpt-4o-mini, claude-sonnet-4, gemini-2.0-flash
  maxTokens: ""       # max tokens for response (default: provider limit)
  apiBaseUrl: ""      # override for enterprise (default: https://api.githubcopilot.com)

# Ollama configuration (if using Ollama provider)
ollama:
  enabled: false
  baseUrl: "http://ollama:11434"
  model: ""

# Kubernetes Watcher mode
watcher:
  enabled: false

  # Single-target mode (legacy) — use "deployment" + "namespace"
  deployment: ""
  namespace: ""

  # Multi-target mode — use "targets" list (takes precedence over deployment/namespace)
  # targets:
  #   - deployment: api-gateway
  #     namespace: production
  #     metricsPort: 9090
  #     metricsPath: "/metrics"
  #     metricsFilter: ["http_requests_*", "http_request_duration_*"]
  #   - deployment: auth-service
  #     namespace: production
  #     metricsPort: 9090
  #   - deployment: worker
  #     namespace: batch
  targets: []

  interval: "30s"
  window: "2h"
  maxLogLines: 100
  # Budget maximo de caracteres para contexto LLM (multi-target)
  maxContextChars: 32000

serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC for K8s watcher mode
rbac:
  create: true
  # Set to true to use ClusterRole/ClusterRoleBinding instead of namespace-scoped Role/RoleBinding.
  # Default false (least-privilege: namespace-scoped).
  clusterWide: false
  # Additional rules beyond the defaults
  additionalRules: []

service:
  type: ClusterIP
  port: 50051
  # Enable headless Service for gRPC client-side load balancing with multiple replicas.
  # When true, DNS returns individual pod IPs instead of a virtual IP,
  # allowing gRPC round-robin distribution across all pods.
  # Recommended when replicaCount > 1.
  headless: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chatcli.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

networkPolicy:
  enabled: false
  # ingressFrom: []

nodeSelector: {}
tolerations: []
affinity: {}

# Prometheus ServiceMonitor (requires Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: ""
  labels: {}

# AIOps enrichment — Prometheus URL for metrics collection during incident analysis.
# When set, the operator queries Prometheus for CPU, memory, latency, error rate
# trends around incident time, providing quantitative context to the AI.
# Example: "http://prometheus-server.monitoring.svc:9090"
prometheusUrl: ""

# Security hardening configuration
# All fields map to CHATCLI_* environment variables on the server pod.
security:
  # JWT authentication secret (leave empty to use legacy token auth)
  # For production: use jwtSecretRef to reference a Kubernetes Secret instead.
  jwtSecret: ""
  # Reference a Secret key for JWT secret (recommended over plain jwtSecret)
  jwtSecretRef: {}
  #   name: chatcli-jwt
  #   key: secret

  # Per-client rate limiting
  rateLimitRps: ""      # requests/second (default: 10)
  rateLimitBurst: ""    # burst size (default: 30)

  # gRPC message size limits
  maxRecvMsgSize: ""    # bytes (default: 52428800 = 50MB)
  maxSendMsgSize: ""    # bytes (default: 52428800 = 50MB)
  maxConcurrentStreams: "" # (default: 100)

  # Server bind address (default: 127.0.0.1, set 0.0.0.0 to expose)
  bindAddress: ""

  # Audit logging
  auditLogPath: ""      # file path for JSON-lines audit log

  # Debug mode (enables stack traces in error logs)
  debug: false

  # Agent security mode: "strict" (allowlist only) or "permissive" (allowlist + denylist)
  agentSecurityMode: ""

  # Session TTL in days (default: 90)
  sessionTTL: ""

  # Environment variable redaction: "strict" or "permissive"
  envRedactMode: ""

  # Allow unsigned plugins (dev only, default: false)
  allowUnsignedPlugins: false

  # Allow insecure (non-TLS) gRPC connections (default: false)
  allowInsecure: false

  # Encryption key for sessions at rest (leave empty to use auth key)
  # For production: set via extraEnv with secretKeyRef instead.
  encryptionKey: ""

# Extra environment variables
extraEnv: []
# - name: LOG_LEVEL
#   value: "debug"
# - name: CHATCLI_AGENT_ALLOWLIST
#   value: "terraform,ansible,packer"
# - name: CHATCLI_ENCRYPTION_KEY
#   valueFrom:
#     secretKeyRef:
#       name: chatcli-secrets
#       key: encryption-key

# Persistence for sessions
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Agent/Skill provisioning (remote resource discovery)
agents:
  enabled: false
  # Inline agent definitions (creates ConfigMap automatically)
  # Each key is the filename (e.g., coder.md), value is the full markdown content
  definitions: {}
  #   coder.md: |
  #     ---
  #     name: coder
  #     description: Expert coder agent
  #     model: gpt-4
  #     skills: [golang, docker]
  #     ---
  #     You are an expert coder...
  # Or reference an existing ConfigMap containing agent .md files
  existingConfigMap: ""

skills:
  enabled: false
  # Inline skill definitions (creates ConfigMap automatically)
  definitions: {}
  #   golang.md: |
  #     ---
  #     name: golang
  #     description: Go programming skill
  #     ---
  #     You are a Go expert...
  # Or reference an existing ConfigMap containing skill .md files
  existingConfigMap: ""

# Bootstrap files (SOUL.md, USER.md, IDENTITY.md, RULES.md, AGENTS.md)
# Loaded into system prompt for agent personality and behavior
bootstrap:
  enabled: false
  # Inline bootstrap file definitions (creates ConfigMap automatically)
  definitions: {}
  #   SOUL.md: |
  #     You are a helpful DevOps assistant...
  #   USER.md: |
  #     The user prefers Go and Kubernetes...
  # Or reference an existing ConfigMap containing bootstrap .md files
  existingConfigMap: ""

# Memory persistence (long-term MEMORY.md + daily notes)
memory:
  enabled: false
  # Uses the persistence PVC by default.
  # Memory files are stored under /home/chatcli/.chatcli/memory/

# Shell safety configuration
safety:
  enabled: false
  # Inline safety config (creates ConfigMap automatically)
  config: {}
  #   denyPatterns:
  #     - pattern: "rm -rf /"
  #       severity: critical
  #   allowPatterns:
  #     - pattern: "go test"
  #   workspaceBoundary: "/workspace"
  # Or reference an existing ConfigMap with safety_config.json
  existingConfigMap: ""

# Skill Registry configuration (multi-registry support)
skillRegistry:
  enabled: false
  # Comma-separated list of additional registry URLs
  registryUrls: ""
  # Comma-separated list of registry names to disable
  registryDisable: ""
  # Override the skill install directory inside the container
  installDir: ""

# Plugin provisioning (remote resource discovery)
plugins:
  enabled: false
  # Init container image containing plugin binaries in /plugins/
  # The init container copies binaries to the chatcli plugins directory
  initImage: ""
  # Or reference an existing PVC with pre-installed plugin binaries
  existingPVC: ""
