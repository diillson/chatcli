---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: incidentslas.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: IncidentSLA
    listKind: IncidentSLAList
    plural: incidentslas
    shortNames:
    - sla
    singular: incidentsla
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.severity
      name: Severity
      type: string
    - jsonPath: .spec.responseTime
      name: ResponseTime
      type: string
    - jsonPath: .spec.resolutionTime
      name: ResolutionTime
      type: string
    - jsonPath: .status.compliancePercentage
      name: Compliance%
      type: number
    - jsonPath: .status.totalViolations
      name: Violations
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: IncidentSLA defines SLA targets for incident response and resolution
          by severity.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IncidentSLASpec defines the desired state of IncidentSLA.
            properties:
              businessHours:
                description: BusinessHours defines the business hours window.
                properties:
                  endHour:
                    default: 18
                    description: EndHour is the end of business hours (0-23).
                    format: int32
                    maximum: 23
                    minimum: 0
                    type: integer
                  startHour:
                    default: 9
                    description: StartHour is the start of business hours (0-23).
                    format: int32
                    maximum: 23
                    minimum: 0
                    type: integer
                  timezone:
                    default: UTC
                    description: Timezone for business hours (e.g., "America/Sao_Paulo",
                      "UTC").
                    type: string
                  workDays:
                    default:
                    - Monday
                    - Tuesday
                    - Wednesday
                    - Thursday
                    - Friday
                    description: WorkDays are the days when the SLA clock runs.
                    items:
                      type: string
                    type: array
                required:
                - endHour
                - startHour
                - timezone
                - workDays
                type: object
              businessHoursOnly:
                description: BusinessHoursOnly pauses the SLA clock outside business
                  hours.
                type: boolean
              escalationPolicyRef:
                description: EscalationPolicyRef references an EscalationPolicy to
                  trigger on SLA breach.
                type: string
              notificationPolicyRef:
                description: NotificationPolicyRef references a NotificationPolicy
                  for SLA breach notifications.
                type: string
              resolutionTime:
                description: ResolutionTime is the maximum allowed time from detection
                  to resolution (e.g., "1h", "4h", "24h").
                type: string
              responseTime:
                description: ResponseTime is the maximum allowed time from detection
                  to first analysis (e.g., "5m", "15m", "1h").
                type: string
              severity:
                description: Severity this SLA applies to.
                enum:
                - critical
                - high
                - medium
                - low
                type: string
            required:
            - resolutionTime
            - responseTime
            - severity
            type: object
          status:
            description: IncidentSLAStatus defines the observed state of IncidentSLA.
            properties:
              activeViolations:
                description: ActiveViolations is the number of currently open SLA
                  violations.
                format: int32
                type: integer
              averageResolutionTime:
                description: AverageResolutionTime is the average time to resolution.
                type: string
              averageResponseTime:
                description: AverageResponseTime is the average time to first analysis.
                type: string
              compliancePercentage:
                description: CompliancePercentage is the SLA compliance rate (0-100).
                type: number
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastViolationAt:
                description: LastViolationAt is when the last SLA breach occurred.
                format: date-time
                type: string
              recentViolations:
                description: RecentViolations tracks the last 50 violations.
                items:
                  description: SLAViolationRecord tracks a single SLA violation.
                  properties:
                    elapsed:
                      description: Elapsed is the actual duration before the SLA was
                        breached.
                      type: string
                    issueName:
                      description: IssueName is the violating issue.
                      type: string
                    threshold:
                      description: Threshold is the SLA threshold that was breached.
                      type: string
                    type:
                      description: Type is "response" or "resolution".
                      type: string
                    violatedAt:
                      description: ViolatedAt is when the breach was detected.
                      format: date-time
                      type: string
                  required:
                  - elapsed
                  - issueName
                  - threshold
                  - type
                  - violatedAt
                  type: object
                type: array
              totalIssuesTracked:
                description: TotalIssuesTracked is the total number of issues tracked
                  by this SLA.
                format: int64
                type: integer
              totalViolations:
                description: TotalViolations is the total number of SLA violations.
                format: int64
                type: integer
            required:
            - activeViolations
            - compliancePercentage
            - totalIssuesTracked
            - totalViolations
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
