---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: postmortems.
spec:
  group: ""
  names:
    kind: PostMortem
    listKind: PostMortemList
    plural: postmortems
    shortNames:
    - pm
    singular: postmortem
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.issueRef.name
      name: Issue
      type: string
    - jsonPath: .spec.severity
      name: Severity
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: ""
    schema:
      openAPIV3Schema:
        description: PostMortem captures the full incident lifecycle after resolution.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PostMortemSpec defines the immutable input fields for a PostMortem.
            properties:
              issueRef:
                description: IssueRef references the parent Issue.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              resource:
                description: Resource that was affected.
                properties:
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - kind
                - name
                - namespace
                type: object
              severity:
                description: Severity of the original issue.
                enum:
                - critical
                - high
                - medium
                - low
                type: string
            required:
            - issueRef
            - resource
            - severity
            type: object
          status:
            description: PostMortemStatus defines the observed state of a PostMortem.
            properties:
              actionsExecuted:
                description: ActionsExecuted records all remediation actions and their
                  results.
                items:
                  description: ActionRecord captures a single remediation action and
                    its outcome.
                  properties:
                    action:
                      description: Action type that was executed (e.g., "RestartDeployment",
                        "AdjustResources").
                      type: string
                    detail:
                      description: Detail describes the outcome.
                      type: string
                    params:
                      additionalProperties:
                        type: string
                      description: Params are the action-specific parameters.
                      type: object
                    result:
                      description: Result is "success" or "failed".
                      type: string
                    timestamp:
                      description: Timestamp of execution.
                      format: date-time
                      type: string
                  required:
                  - action
                  - detail
                  - result
                  - timestamp
                  type: object
                type: array
              duration:
                description: Duration is the total incident duration (e.g., "12m34s").
