---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: servicelevelobjectives.
spec:
  group: ""
  names:
    kind: ServiceLevelObjective
    listKind: ServiceLevelObjectiveList
    plural: servicelevelobjectives
    shortNames:
    - slo
    singular: servicelevelobjective
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serviceName
      name: Service
      type: string
    - jsonPath: .spec.target.percentage
      name: Target%
      type: number
    - jsonPath: .status.currentValue
      name: Current
      type: number
    - jsonPath: .status.errorBudgetConsumedPercentage
      name: BudgetRemaining%
      type: number
    - jsonPath: .status.burnRate1h
      name: BurnRate1h
      type: number
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: ""
    schema:
      openAPIV3Schema:
        description: ServiceLevelObjective defines a service level objective with
          burn rate alerting.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ServiceLevelObjectiveSpec defines the desired state of ServiceLevelObjective.
            properties:
              alertPolicy:
                description: AlertPolicy defines burn rate alerting.
                properties:
                  burnRateWindows:
                    description: BurnRateWindows defines multi-window burn rate alerts.
                    items:
                      description: BurnRateWindow defines a multi-window burn rate
                        alert configuration.
                      properties:
                        burnRateThreshold:
                          description: BurnRateThreshold triggers alert when burn
                            rate exceeds this in both windows.
                          type: number
                        longWindow:
                          description: LongWindow for confirmation (e.g., "6h").
                          type: string
                        severity:
                          description: Severity of the alert when this window fires.
                          enum:
                          - critical
                          - high
                          - medium
                          - low
                          type: string
                        shortWindow:
                          description: ShortWindow for fast detection (e.g., "1h").
                          type: string
                      required:
                      - burnRateThreshold
                      - longWindow
                      - severity
                      - shortWindow
                      type: object
                    type: array
                  notificationPolicyRef:
                    description: NotificationPolicyRef references a NotificationPolicy
                      to use for SLO alerts.
                    type: string
                  pageOnBudgetExhausted:
                    description: PageOnBudgetExhausted creates a critical issue when
                      error budget is fully consumed.
                    type: boolean
                type: object
              description:
                description: Description explains this SLO.
                type: string
              enabled:
                default: true
                description: Enabled activates this SLO.
                type: boolean
              indicator:
                description: Indicator defines what to measure.
                properties:
                  latencyPercentile:
                    description: |-
                      LatencyPercentile specifies which percentile to measure (p50, p95, p99).
                      Only applicable when type=latency.
                    type: string
                  latencyThresholdMs:
                    description: |-
                      LatencyThresholdMs is the latency threshold in milliseconds.
                      Only applicable when type=latency.
                    format: int64
                    type: integer
                  metricSource:
                    default: issues
                    description: MetricSource defines where to get the metric data.
                    enum:
                    - prometheus
                    - watcher
                    - issues
                    type: string
                  prometheusQuery:
                    description: PrometheusQuery is a PromQL query for custom metrics
                      (used when metricSource=prometheus).
                    type: string
                  resource:
                    description: Resource is the target resource to measure (used
                      when metricSource=issues or watcher).
                    properties:
                      kind:
                        type: string
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - kind
                    - name
                    - namespace
                    type: object
                  type:
                    description: Type of indicator.
                    enum:
                    - availability
                    - latency
                    - error_rate
                    - throughput
                    type: string
                required:
                - metricSource
                - type
                type: object
              serviceName:
                description: ServiceName is the service this SLO belongs to.
                type: string
              target:
                description: Target defines the objective.
                properties:
                  percentage:
                    description: Percentage is the SLO target (e.g., 99.9 for 99.9%).
                    type: number
                  window:
                    default: 30d
                    description: Window is the measurement window (e.g., "7d", "30d",
                      "90d").
                    type: string
                required:
                - percentage
                - window
                type: object
            required:
            - enabled
            - indicator
            - serviceName
            - target
            type: object
          status:
            description: ServiceLevelObjectiveStatus defines the observed state of
              ServiceLevelObjective.
            properties:
              activeAlerts:
                description: ActiveAlerts tracks currently firing burn rate alerts.
                items:
                  description: SLOAlert represents an active burn rate alert.
                  properties:
                    burnRate:
                      description: BurnRate observed.
                      type: number
                    firedAt:
                      description: FiredAt is when the alert fired.
                      format: date-time
                      type: string
                    severity:
                      description: Severity of this alert.
                      enum:
                      - critical
                      - high
                      - medium
                      - low
                      type: string
                    window:
                      description: Window that triggered (e.g., "1h/6h").
                      type: string
                  required:
                  - burnRate
                  - firedAt
                  - severity
                  - window
                  type: object
                type: array
              burnRate1h:
                description: BurnRate1h is the burn rate over the last 1 hour.
                type: number
              burnRate6h:
                description: BurnRate6h is the burn rate over the last 6 hours.
                type: number
              burnRate24h:
                description: BurnRate24h is the burn rate over the last 24 hours.
                type: number
              burnRate72h:
                description: BurnRate72h is the burn rate over the last 72 hours.
                type: number
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentValue:
                description: CurrentValue is the current SLI value (e.g., 0.9987 for
                  99.87% availability).
                type: number
              errorBudgetConsumedPercentage:
                description: ErrorBudgetConsumedPercentage is 0-100%.
                type: number
              errorBudgetRemaining:
                description: ErrorBudgetRemaining is the remaining budget as a fraction
                  (0.0-1.0).
                type: number
              errorBudgetTotal:
                description: ErrorBudgetTotal is the total allowed error rate (1 -
                  target, e.g., 0.001 for 99.9%).
                type: number
              lastCalculatedAt:
                description: LastCalculatedAt is when the SLO was last recalculated.
                format: date-time
                type: string
              targetMet:
                description: TargetMet indicates if the SLO target is currently being
                  met.
                type: boolean
            required:
            - burnRate1h
            - burnRate24h
            - burnRate6h
            - burnRate72h
            - currentValue
            - errorBudgetConsumedPercentage
            - errorBudgetRemaining
            - errorBudgetTotal
            - targetMet
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
