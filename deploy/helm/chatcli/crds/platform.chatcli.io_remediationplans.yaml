---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: remediationplans.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: RemediationPlan
    listKind: RemediationPlanList
    plural: remediationplans
    shortNames:
    - rp
    singular: remediationplan
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.issueRef.name
      name: Issue
      type: string
    - jsonPath: .spec.attempt
      name: Attempt
      type: integer
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RemediationPlan records a remediation attempt for an Issue.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RemediationPlanSpec defines the desired state of a RemediationPlan.
            properties:
              actions:
                description: Actions to execute (ignored when AgenticMode is true).
                items:
                  description: RemediationAction defines a single remediation step.
                  properties:
                    params:
                      additionalProperties:
                        type: string
                      description: Params are key-value parameters for the action.
                      type: object
                    type:
                      description: Type of the remediation action.
                      enum:
                      - ScaleDeployment
                      - RollbackDeployment
                      - RestartDeployment
                      - PatchConfig
                      - AdjustResources
                      - DeletePod
                      - HelmRollback
                      - ArgoSyncApp
                      - AdjustHPA
                      - RestartStatefulSetPod
                      - CordonNode
                      - DrainNode
                      - ResizePVC
                      - RotateSecret
                      - ExecDiagnostic
                      - UpdateIngress
                      - PatchNetworkPolicy
                      - ApplyManifest
                      - Custom
                      type: string
                  required:
                  - type
                  type: object
                type: array
              agenticHistory:
                description: |-
                  AgenticHistory records all steps of the agentic loop.
                  Stored in spec (not status) because it is the authoritative
                  conversation history sent to the AI on every step.
                items:
                  description: AgenticStep records one turn of the AI-driven remediation
                    loop.
                  properties:
                    action:
                      description: Action is the action the AI decided to take (nil
                        if observation-only or resolved).
                      properties:
                        params:
                          additionalProperties:
                            type: string
                          description: Params are key-value parameters for the action.
                          type: object
                        type:
                          description: Type of the remediation action.
                          enum:
                          - ScaleDeployment
                          - RollbackDeployment
                          - RestartDeployment
                          - PatchConfig
                          - AdjustResources
                          - DeletePod
                          - HelmRollback
                          - ArgoSyncApp
                          - AdjustHPA
                          - RestartStatefulSetPod
                          - CordonNode
                          - DrainNode
                          - ResizePVC
                          - RotateSecret
                          - ExecDiagnostic
                          - UpdateIngress
                          - PatchNetworkPolicy
                          - ApplyManifest
                          - Custom
                          type: string
                      required:
                      - type
                      type: object
                    aiMessage:
                      description: AIMessage is the AI's reasoning for this step.
                      type: string
                    observation:
                      description: Observation is the result of executing the action.
                      type: string
                    stepNumber:
                      description: StepNumber is 1-based, incremented each reconcile
                        cycle.
                      format: int32
                      type: integer
                    timestamp:
                      description: Timestamp is when this step was recorded.
                      format: date-time
                      type: string
                  required:
                  - aiMessage
                  - stepNumber
                  - timestamp
                  type: object
                type: array
              agenticMaxSteps:
                default: 10
                description: AgenticMaxSteps is the maximum number of agentic steps
                  before forced failure.
                format: int32
                type: integer
              agenticMode:
                description: |-
                  AgenticMode enables AI-driven step-by-step remediation.
                  When true, Actions is ignored and the AI decides each step.
                type: boolean
              attempt:
                description: Attempt number (1-based).
                format: int32
                type: integer
              issueRef:
                description: IssueRef references the parent Issue.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              safetyConstraints:
                description: SafetyConstraints that must be respected.
                items:
                  type: string
                type: array
              strategy:
                description: Strategy describes the remediation approach.
                type: string
            required:
            - attempt
            - issueRef
            - strategy
            type: object
          status:
            description: RemediationPlanStatus defines the observed state of a RemediationPlan.
            properties:
              actionsCompletedAt:
                description: ActionsCompletedAt is when all actions finished executing
                  and verification began.
                format: date-time
                type: string
              agenticStartedAt:
                description: AgenticStartedAt is when the agentic loop first started.
                format: date-time
                type: string
              agenticStepCount:
                description: AgenticStepCount is the number of agentic steps completed.
                format: int32
                type: integer
              completedAt:
                description: CompletedAt is when execution finished (after verification).
                format: date-time
                type: string
              evidence:
                description: Evidence collected during execution.
                items:
                  description: EvidenceItem is a piece of evidence collected during
                    remediation.
                  properties:
                    data:
                      description: Data content.
                      type: string
                    timestamp:
                      description: Timestamp when collected.
                      format: date-time
                      type: string
                    type:
                      description: Type of evidence (log, metric_snapshot, event).
                      type: string
                  required:
                  - data
                  - timestamp
                  - type
                  type: object
                type: array
              result:
                description: Result describes the outcome.
                type: string
              startedAt:
                description: StartedAt is when execution began.
                format: date-time
                type: string
              state:
                description: State of the remediation plan execution.
                enum:
                - Pending
                - Executing
                - Verifying
                - Completed
                - Failed
                - RolledBack
                type: string
            required:
            - state
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
