---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: approvalrequests.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: ApprovalRequest
    listKind: ApprovalRequestList
    plural: approvalrequests
    shortNames:
    - ar
    singular: approvalrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.issueRef.name
      name: Issue
      type: string
    - jsonPath: .spec.remediationPlanRef
      name: Plan
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .spec.ruleName
      name: Rule
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ApprovalRequest represents a pending approval for a remediation
          action.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApprovalRequestSpec defines the desired state of ApprovalRequest.
            properties:
              blastRadius:
                description: BlastRadius assessment of the proposed actions.
                properties:
                  affectedNamespaces:
                    description: AffectedNamespaces lists namespaces with affected
                      resources.
                    items:
                      type: string
                    type: array
                  affectedPods:
                    description: AffectedPods is the number of pods that will be affected.
                    format: int32
                    type: integer
                  affectedServices:
                    description: AffectedServices is the number of services routing
                      to affected pods.
                    format: int32
                    type: integer
                  description:
                    description: Description explains the blast radius assessment.
                    type: string
                  riskLevel:
                    description: RiskLevel is the assessed risk (low/medium/high/critical).
                    type: string
                required:
                - affectedPods
                - affectedServices
                - description
                - riskLevel
                type: object
              evidence:
                description: Evidence supporting the remediation decision.
                properties:
                  aiAnalysis:
                    description: AIAnalysis is the AI's root cause analysis.
                    type: string
                  aiConfidence:
                    description: AIConfidence from the AIInsight analysis (0.0-1.0).
                    type: number
                  historicalSuccessRate:
                    description: HistoricalSuccessRate for this action type (0.0-1.0).
                    type: number
                  preflightSnapshot:
                    description: PreflightSnapshot captures the resource state before
                      remediation.
                    type: string
                  previousAttempts:
                    description: PreviousAttempts is the number of previous remediation
                      attempts.
                    format: int32
                    type: integer
                required:
                - aiConfidence
                - historicalSuccessRate
                - previousAttempts
                type: object
              issueRef:
                description: IssueRef references the parent Issue.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              policyRef:
                description: PolicyRef is the name of the ApprovalPolicy that triggered
                  this request.
                type: string
              remediationPlanRef:
                description: RemediationPlanRef is the name of the RemediationPlan
                  needing approval.
                type: string
              requestedActions:
                description: RequestedActions are the remediation actions needing
                  approval.
                items:
                  description: RemediationAction defines a single remediation step.
                  properties:
                    params:
                      additionalProperties:
                        type: string
                      description: Params are key-value parameters for the action.
                      type: object
                    type:
                      description: Type of the remediation action.
                      enum:
                      - ScaleDeployment
                      - RollbackDeployment
                      - RestartDeployment
                      - PatchConfig
                      - AdjustResources
                      - DeletePod
                      - HelmRollback
                      - ArgoSyncApp
                      - AdjustHPA
                      - RestartStatefulSetPod
                      - CordonNode
                      - DrainNode
                      - ResizePVC
                      - RotateSecret
                      - ExecDiagnostic
                      - UpdateIngress
                      - PatchNetworkPolicy
                      - ApplyManifest
                      - Custom
                      type: string
                  required:
                  - type
                  type: object
                type: array
              requester:
                description: Requester identifies who/what created this request.
                type: string
              requiredApprovers:
                default: 1
                description: RequiredApprovers for quorum mode.
                format: int32
                type: integer
              ruleName:
                description: RuleName identifies which rule in the policy matched.
                type: string
              timeoutMinutes:
                default: 30
                description: TimeoutMinutes before the request expires.
                format: int32
                type: integer
            required:
            - issueRef
            - policyRef
            - remediationPlanRef
            - requestedActions
            - requester
            - requiredApprovers
            - ruleName
            - timeoutMinutes
            type: object
          status:
            description: ApprovalRequestStatus defines the observed state of ApprovalRequest.
            properties:
              approvedAt:
                description: ApprovedAt is when the request was approved.
                format: date-time
                type: string
              autoApproved:
                description: AutoApproved indicates the request was auto-approved
                  by policy.
                type: boolean
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              decisions:
                description: Decisions records all approver decisions.
                items:
                  description: ApprovalDecision records a single approver's decision.
                  properties:
                    approver:
                      description: Approver identifies who made the decision.
                      type: string
                    decision:
                      description: Decision is "approved" or "rejected".
                      type: string
                    reason:
                      description: Reason explains the decision.
                      type: string
                    timestamp:
                      description: Timestamp of the decision.
                      format: date-time
                      type: string
                  required:
                  - approver
                  - decision
                  - timestamp
                  type: object
                type: array
              expiredAt:
                description: ExpiredAt is when the request expired.
                format: date-time
                type: string
              rejectedAt:
                description: RejectedAt is when the request was rejected.
                format: date-time
                type: string
              state:
                description: State of the approval request.
                enum:
                - Pending
                - Approved
                - Rejected
                - Expired
                type: string
            required:
            - autoApproved
            - state
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
