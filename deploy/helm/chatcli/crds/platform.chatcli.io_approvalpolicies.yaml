    controller-gen.kubebuilder.io/version: v0.17.2
  name: approvalpolicies.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: ApprovalPolicy
    listKind: ApprovalPolicyList
    plural: approvalpolicies
    shortNames:
    - ap
    singular: approvalpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.defaultMode
      name: DefaultMode
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.totalApproved
      name: Approved
      type: integer
    - jsonPath: .status.totalRejected
      name: Rejected
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ApprovalPolicy defines approval requirements for remediation
          actions.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApprovalPolicySpec defines the desired state of ApprovalPolicy.
            properties:
              defaultMode:
                default: manual
                description: DefaultMode is used when no rule matches.
                type: string
              enabled:
                default: true
                description: Enabled activates this policy.
                type: boolean
              rules:
                description: Rules define approval requirements for different action/severity
                  combinations.
                items:
                  description: ApprovalRule defines a single approval requirement.
                  properties:
                    autoApproveConditions:
                      description: AutoApproveConditions for auto mode — all conditions
                        must be met.
                      properties:
                        historicalSuccessRate:
                          description: HistoricalSuccessRate required for auto-approval
                            (0.0-1.0).
                          type: number
                        maxSeverity:
                          description: MaxSeverity — auto-approve only up to this
                            severity level.
                          enum:
                          - critical
                          - high
                          - medium
                          - low
                          type: string
                        minConfidence:
                          description: MinConfidence from AIInsight required for auto-approval
                            (0.0-1.0).
                          type: number
                      required:
                      - historicalSuccessRate
                      - maxSeverity
                      - minConfidence
                      type: object
                    changeWindow:
                      description: ChangeWindow restricts when changes can be executed.
                      properties:
                        allowedDays:
                          default:
                          - Monday
                          - Tuesday
                          - Wednesday
                          - Thursday
                          - Friday
                          description: AllowedDays when changes are permitted.
                          items:
                            type: string
                          type: array
                        endHour:
                          description: EndHour of the change window (0-23).
                          format: int32
                          maximum: 23
                          minimum: 0
                          type: integer
                        startHour:
                          description: StartHour of the change window (0-23).
                          format: int32
                          maximum: 23
                          minimum: 0
                          type: integer
                        timezone:
                          default: UTC
                          description: Timezone for the change window (e.g., "America/Sao_Paulo").
                          type: string
                      required:
                      - allowedDays
                      - endHour
                      - startHour
                      - timezone
                      type: object
                    match:
                      description: Match criteria for when this rule applies.
                      properties:
                        actionTypes:
                          description: ActionTypes to match (empty = all).
                          items:
                            description: RemediationActionType defines the type of
                              remediation action.
                            enum:
                            - ScaleDeployment
                            - RollbackDeployment
                            - RestartDeployment
                            - PatchConfig
                            - AdjustResources
                            - DeletePod
                            - HelmRollback
                            - ArgoSyncApp
                            - AdjustHPA
                            - RestartStatefulSetPod
                            - CordonNode
                            - DrainNode
                            - ResizePVC
                            - RotateSecret
                            - ExecDiagnostic
                            - UpdateIngress
                            - PatchNetworkPolicy
                            - ApplyManifest
                            - ScaleStatefulSet
                            - RestartStatefulSet
                            - RollbackStatefulSet
                            - AdjustStatefulSetResources
                            - DeleteStatefulSetPod
                            - ForceDeleteStatefulSetPod
                            - UpdateStatefulSetStrategy
                            - RecreateStatefulSetPVC
                            - PartitionStatefulSetUpdate
                            - RestartDaemonSet
                            - RollbackDaemonSet
                            - AdjustDaemonSetResources
                            - DeleteDaemonSetPod
                            - UpdateDaemonSetStrategy
                            - PauseDaemonSetRollout
                            - CordonAndDeleteDaemonSetPod
                            - RetryJob
                            - AdjustJobResources
                            - DeleteFailedJob
                            - SuspendJob
                            - ResumeJob
                            - AdjustJobParallelism
                            - AdjustJobDeadline
                            - AdjustJobBackoffLimit
                            - ForceDeleteJobPods
                            - SuspendCronJob
                            - ResumeCronJob
                            - TriggerCronJob
                            - AdjustCronJobResources
                            - AdjustCronJobSchedule
                            - AdjustCronJobDeadline
                            - AdjustCronJobHistory
                            - AdjustCronJobConcurrency
                            - DeleteCronJobActiveJobs
                            - ReplaceCronJobTemplate
                            - Custom
                            type: string
                          type: array
                        namespaces:
                          description: Namespaces to match (empty = all).
                          items:
                            type: string
                          type: array
                        resourceKinds:
                          description: ResourceKinds to match (empty = all).
                          items:
                            type: string
                          type: array
                        severities:
                          description: Severities to match (empty = all).
                          items:
                            description: IssueSeverity represents the severity level
                              of an issue.
                            enum:
                            - critical
                            - high
                            - medium
                            - low
                            type: string
                          type: array
                      type: object
                    mode:
                      default: manual
                      description: Mode determines how approval is handled.
                      enum:
                      - auto
                      - manual
                      - quorum
                      type: string
                    name:
                      description: Name is a human-readable identifier.
                      type: string
                    requiredApprovers:
                      default: 1
                      description: RequiredApprovers for quorum mode.
                      format: int32
                      type: integer
                    timeoutMinutes:
                      default: 30
                      description: TimeoutMinutes before the request auto-expires.
                      format: int32
                      type: integer
                  required:
                  - match
                  - mode
                  - name
                  type: object
                type: array
            required:
            - enabled
            - rules
            type: object
          status:
            description: ApprovalPolicyStatus defines the observed state of ApprovalPolicy.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              totalApproved:
                description: TotalApproved is the total approved requests.
                format: int64
                type: integer
              totalAutoApproved:
                description: TotalAutoApproved is the total auto-approved requests.
                format: int64
                type: integer
              totalExpired:
                description: TotalExpired is the total expired requests.
                format: int64
                type: integer
              totalRejected:
