{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.server.token }}
  CHATCLI_SERVER_TOKEN: {{ .Values.server.token | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.googleaiApiKey }}
  GOOGLEAI_API_KEY: {{ .Values.secrets.googleaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.xaiApiKey }}
  XAI_API_KEY: {{ .Values.secrets.xaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.zaiApiKey }}
  ZAI_API_KEY: {{ .Values.secrets.zaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.minimaxApiKey }}
  MINIMAX_API_KEY: {{ .Values.secrets.minimaxApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.minimaxApiCompat }}
  MINIMAX_API_COMPAT: {{ .Values.secrets.minimaxApiCompat | quote }}
  {{- end }}
  {{- if .Values.secrets.stackspotClientId }}
  CLIENT_ID: {{ .Values.secrets.stackspotClientId | quote }}
  {{- end }}
  {{- if .Values.secrets.stackspotClientKey }}
  CLIENT_KEY: {{ .Values.secrets.stackspotClientKey | quote }}
  {{- end }}
  {{- if .Values.secrets.stackspotRealm }}
  STACKSPOT_REALM: {{ .Values.secrets.stackspotRealm | quote }}
  {{- end }}
  {{- if .Values.secrets.stackspotAgentId }}
  STACKSPOT_AGENT_ID: {{ .Values.secrets.stackspotAgentId | quote }}
  {{- end }}
  {{- if .Values.secrets.githubCopilotToken }}
  GITHUB_COPILOT_TOKEN: {{ .Values.secrets.githubCopilotToken | quote }}
  {{- end }}
  {{- if .Values.secrets.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  {{- end }}
  {{- /* AWS Bedrock credentials (only emitted when set; prefer IRSA via SA annotations). */}}
  {{- if .Values.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  {{- end }}
  {{- if .Values.secrets.awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  {{- end }}
  {{- if .Values.secrets.awsSessionToken }}
  AWS_SESSION_TOKEN: {{ .Values.secrets.awsSessionToken | quote }}
  {{- end }}
  {{- if .Values.secrets.bedrockRegion }}
  BEDROCK_REGION: {{ .Values.secrets.bedrockRegion | quote }}
  {{- end }}
  {{- if .Values.secrets.awsRegion }}
  AWS_REGION: {{ .Values.secrets.awsRegion | quote }}
  {{- end }}
  {{- if .Values.secrets.chatcliBedrockCaBundle }}
  CHATCLI_BEDROCK_CA_BUNDLE: {{ .Values.secrets.chatcliBedrockCaBundle | quote }}
  {{- end }}
  {{- if .Values.secrets.chatcliBedrockInsecureSkipVerify }}
  CHATCLI_BEDROCK_INSECURE_SKIP_VERIFY: {{ .Values.secrets.chatcliBedrockInsecureSkipVerify | quote }}
  {{- end }}
{{- end }}
