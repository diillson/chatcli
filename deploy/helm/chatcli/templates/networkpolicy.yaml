{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chatcli.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - port: {{ .Values.server.port }}
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.port | default 9090 }}
      protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.ingressFrom }}
    from:
      {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
  - {}  # Allow all egress (LLM API calls, DNS, etc.)
{{- end }}
