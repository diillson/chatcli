{{- if and .Values.bootstrap.enabled .Values.bootstrap.definitions (not .Values.bootstrap.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chatcli.fullname" . }}-bootstrap
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.bootstrap.definitions }}
  {{ $filename }}: |
{{ $content | indent 4 }}
  {{- end }}
{{- end }}
