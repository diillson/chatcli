{{- if .Values.rbac.create -}}
{{- /*
  Auto-detect if ClusterRole is needed:
  1. Explicitly set via rbac.clusterWide: true
  2. Targets in multiple different namespaces
  3. Any target in a different namespace than the Helm release namespace
*/ -}}
{{- $needsClusterWide := .Values.rbac.clusterWide -}}
{{- if and (not $needsClusterWide) .Values.watcher.enabled .Values.watcher.targets -}}
  {{- $namespaces := dict -}}
  {{- range .Values.watcher.targets -}}
    {{- $ns := .namespace | default "default" -}}
    {{- $_ := set $namespaces $ns true -}}
  {{- end -}}
  {{- if gt (len $namespaces) 1 -}}
    {{- $needsClusterWide = true -}}
  {{- else -}}
    {{- range $ns, $_ := $namespaces -}}
      {{- if ne $ns $.Release.Namespace -}}
        {{- $needsClusterWide = true -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if $needsClusterWide }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
rules:
  # Core resources for watcher mode
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  # Platform CRDs (operator manages these)
  - apiGroups: [ "platform.chatcli.io" ]
    resources: [ "runbooks", "sourcerepositories", "sourcerepositories/status" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  # Core resources for watcher + remediation
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Nodes (for cordon/drain remediation)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Apps resources (extended verbs for remediation)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Batch resources (Jobs, CronJobs)
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # Autoscaling (extended verbs for HPA adjustment)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Networking (extended verbs for ingress/networkpolicy remediation)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Policy (PDB checks for blast radius prediction)
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  # Discovery (endpoint slices for dependency health)
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # ArgoCD Applications (optional — for GitOps detection)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Flux Kustomizations (optional — for GitOps detection)
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  # Metrics (for resource usage)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  {{- with .Values.rbac.additionalRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chatcli.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chatcli.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
rules:
  # Core resources for watcher mode (namespace-scoped)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Platform CRDs (operator manages these)
  - apiGroups: [ "platform.chatcli.io" ]
    resources: [ "runbooks", "sourcerepositories", "sourcerepositories/status" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  # Core resources for watcher + remediation
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Apps resources (extended verbs for remediation)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Batch resources
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  # Autoscaling (extended verbs for HPA adjustment)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Networking (extended verbs for remediation)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Policy (PDB checks)
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  # Discovery (endpoint slices)
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  # ArgoCD (optional)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Flux (optional)
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  {{- with .Values.rbac.additionalRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "chatcli.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chatcli.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
