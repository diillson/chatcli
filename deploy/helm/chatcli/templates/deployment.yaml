apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatcli.fullname" . }}
  labels:
    {{- include "chatcli.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "chatcli.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "chatcli.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chatcli.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.plugins.enabled .Values.plugins.initImage }}
      initContainers:
        - name: plugin-loader
          image: {{ .Values.plugins.initImage }}
          command: ["sh", "-c", "cp -a /plugins/* /target-plugins/ 2>/dev/null || true"]
          volumeMounts:
            - name: plugins
              mountPath: /target-plugins
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["chatcli", "server"]
          args:
            - "--port={{ .Values.server.port }}"
            {{- if .Values.server.metricsPort }}
            - "--metrics-port={{ .Values.server.metricsPort }}"
            {{- end }}
            {{- if .Values.server.token }}
            - "--token={{ .Values.server.token }}"
            {{- end }}
            {{- if .Values.llm.provider }}
            - "--provider={{ .Values.llm.provider }}"
            {{- end }}
            {{- if .Values.llm.model }}
            - "--model={{ .Values.llm.model }}"
            {{- end }}
            {{- if and .Values.mcp.enabled .Values.mcp.servers }}
            - "--mcp-config=/etc/chatcli/mcp/mcp_servers.json"
            {{- end }}
            {{- if .Values.tls.enabled }}
            - "--tls-cert={{ .Values.tls.certFile }}"
            - "--tls-key={{ .Values.tls.keyFile }}"
            {{- end }}
            {{- if and .Values.watcher.enabled .Values.watcher.targets }}
            - "--watch-config=/etc/chatcli/watch/watch-config.yaml"
            {{- else if and .Values.watcher.enabled .Values.watcher.deployment }}
            - "--watch-deployment={{ .Values.watcher.deployment }}"
            - "--watch-namespace={{ .Values.watcher.namespace }}"
            - "--watch-interval={{ .Values.watcher.interval }}"
            - "--watch-window={{ .Values.watcher.window }}"
            - "--watch-max-log-lines={{ .Values.watcher.maxLogLines }}"
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.server.port }}
              protocol: TCP
            {{- if .Values.server.metricsPort }}
            - name: metrics
              containerPort: {{ .Values.server.metricsPort }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "chatcli.fullname" . }}
                optional: true
            - secretRef:
                name: {{ include "chatcli.secretName" . }}
                optional: true
          env:
            - name: HOME
              value: /home/chatcli
          {{- if .Values.prometheusUrl }}
            - name: PROMETHEUS_URL
              value: {{ .Values.prometheusUrl | quote }}
          {{- end }}
          {{- /* Security configuration env vars */ -}}
          {{- if .Values.security.jwtSecret }}
            - name: CHATCLI_JWT_SECRET
              value: {{ .Values.security.jwtSecret | quote }}
          {{- end }}
          {{- if .Values.security.jwtSecretRef }}
            - name: CHATCLI_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.security.jwtSecretRef.name }}
                  key: {{ .Values.security.jwtSecretRef.key }}
          {{- end }}
          {{- if .Values.security.rateLimitRps }}
            - name: CHATCLI_RATE_LIMIT_RPS
              value: {{ .Values.security.rateLimitRps | quote }}
          {{- end }}
          {{- if .Values.security.rateLimitBurst }}
            - name: CHATCLI_RATE_LIMIT_BURST
              value: {{ .Values.security.rateLimitBurst | quote }}
          {{- end }}
          {{- if .Values.security.maxRecvMsgSize }}
            - name: CHATCLI_MAX_RECV_MSG_SIZE
              value: {{ .Values.security.maxRecvMsgSize | quote }}
          {{- end }}
          {{- if .Values.security.maxSendMsgSize }}
            - name: CHATCLI_MAX_SEND_MSG_SIZE
              value: {{ .Values.security.maxSendMsgSize | quote }}
          {{- end }}
          {{- if .Values.security.maxConcurrentStreams }}
            - name: CHATCLI_MAX_CONCURRENT_STREAMS
              value: {{ .Values.security.maxConcurrentStreams | quote }}
          {{- end }}
          {{- if .Values.security.bindAddress }}
            - name: CHATCLI_BIND_ADDRESS
              value: {{ .Values.security.bindAddress | quote }}
          {{- end }}
          {{- if .Values.security.auditLogPath }}
            - name: CHATCLI_AUDIT_LOG_PATH
              value: {{ .Values.security.auditLogPath | quote }}
          {{- end }}
          {{- if .Values.security.debug }}
            - name: CHATCLI_DEBUG
              value: "true"
          {{- end }}
          {{- if .Values.security.agentSecurityMode }}
            - name: CHATCLI_AGENT_SECURITY_MODE
              value: {{ .Values.security.agentSecurityMode | quote }}
          {{- end }}
          {{- if .Values.security.sessionTTL }}
            - name: CHATCLI_SESSION_TTL
              value: {{ .Values.security.sessionTTL | quote }}
          {{- end }}
          {{- if .Values.security.envRedactMode }}
            - name: CHATCLI_ENV_REDACT_MODE
              value: {{ .Values.security.envRedactMode | quote }}
          {{- end }}
          {{- if .Values.security.allowUnsignedPlugins }}
            - name: CHATCLI_ALLOW_UNSIGNED_PLUGINS
              value: "true"
          {{- end }}
          {{- if .Values.security.allowInsecure }}
            - name: CHATCLI_ALLOW_INSECURE
              value: "true"
          {{- end }}
          {{- if .Values.security.encryptionKey }}
            - name: CHATCLI_ENCRYPTION_KEY
              value: {{ .Values.security.encryptionKey | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $mounts := list }}
          {{- if .Values.persistence.enabled }}
          {{- $mounts = append $mounts (dict "name" "sessions" "mountPath" "/home/chatcli/.chatcli/sessions") }}
          {{- end }}
          {{- if .Values.tls.existingSecret }}
          {{- $mounts = append $mounts (dict "name" "tls-certs" "mountPath" "/etc/chatcli/tls" "readOnly" true) }}
          {{- end }}
          {{- if and .Values.watcher.enabled .Values.watcher.targets }}
          {{- $mounts = append $mounts (dict "name" "watch-config" "mountPath" "/etc/chatcli/watch" "readOnly" true) }}
          {{- end }}
          {{- if and .Values.securityContext .Values.securityContext.readOnlyRootFilesystem }}
          {{- $mounts = append $mounts (dict "name" "tmp" "mountPath" "/tmp") }}
          {{- $mounts = append $mounts (dict "name" "data" "mountPath" "/home/chatcli/.chatcli") }}
          {{- end }}
          {{- if .Values.agents.enabled }}
          {{- $agentsCM := .Values.agents.existingConfigMap | default (printf "%s-agents" (include "chatcli.fullname" .)) }}
          {{- $mounts = append $mounts (dict "name" "agents" "mountPath" "/home/chatcli/.chatcli/agents" "readOnly" true) }}
          {{- end }}
          {{- if .Values.skills.enabled }}
          {{- $skillsCM := .Values.skills.existingConfigMap | default (printf "%s-skills" (include "chatcli.fullname" .)) }}
          {{- $mounts = append $mounts (dict "name" "skills" "mountPath" "/home/chatcli/.chatcli/skills" "readOnly" true) }}
          {{- end }}
          {{- if .Values.plugins.enabled }}
          {{- $mounts = append $mounts (dict "name" "plugins" "mountPath" "/home/chatcli/.chatcli/plugins") }}
          {{- end }}
          {{- if and .Values.mcp.enabled .Values.mcp.servers }}
          {{- $mounts = append $mounts (dict "name" "mcp-config" "mountPath" "/etc/chatcli/mcp" "readOnly" true) }}
          {{- end }}
          {{- if .Values.bootstrap.enabled }}
          {{- $mounts = append $mounts (dict "name" "bootstrap" "mountPath" "/home/chatcli/.chatcli/bootstrap" "readOnly" true) }}
          {{- end }}
          {{- if .Values.memory.enabled }}
          {{- $mounts = append $mounts (dict "name" "memory" "mountPath" "/home/chatcli/.chatcli/memory") }}
          {{- end }}
          {{- if $mounts }}
          volumeMounts:
            {{- toYaml $mounts | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            grpc:
              port: {{ .Values.server.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: {{ .Values.server.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          startupProbe:
            grpc:
              port: {{ .Values.server.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      {{- if or .Values.persistence.enabled .Values.tls.existingSecret (and .Values.watcher.enabled .Values.watcher.targets) (and .Values.securityContext .Values.securityContext.readOnlyRootFilesystem) .Values.agents.enabled .Values.skills.enabled .Values.plugins.enabled (and .Values.mcp.enabled .Values.mcp.servers) .Values.bootstrap.enabled .Values.memory.enabled }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: sessions
          persistentVolumeClaim:
            claimName: {{ include "chatcli.fullname" . }}-sessions
        {{- end }}
        {{- if .Values.tls.existingSecret }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
        {{- if and .Values.watcher.enabled .Values.watcher.targets }}
        - name: watch-config
          configMap:
            name: {{ include "chatcli.fullname" . }}-watch-config
        {{- end }}
        {{- if and .Values.securityContext .Values.securityContext.readOnlyRootFilesystem }}
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: data
          emptyDir:
            sizeLimit: 200Mi
        {{- end }}
        {{- if .Values.agents.enabled }}
        - name: agents
          configMap:
            name: {{ .Values.agents.existingConfigMap | default (printf "%s-agents" (include "chatcli.fullname" .)) }}
        {{- end }}
        {{- if .Values.skills.enabled }}
        - name: skills
          configMap:
            name: {{ .Values.skills.existingConfigMap | default (printf "%s-skills" (include "chatcli.fullname" .)) }}
        {{- end }}
        {{- if .Values.plugins.enabled }}
        - name: plugins
          {{- if .Values.plugins.existingPVC }}
          persistentVolumeClaim:
            claimName: {{ .Values.plugins.existingPVC }}
          {{- else }}
          emptyDir:
            sizeLimit: 500Mi
          {{- end }}
        {{- end }}
        {{- if and .Values.mcp.enabled .Values.mcp.servers }}
        - name: mcp-config
          configMap:
            name: {{ .Values.mcp.existingConfigMap | default (printf "%s-mcp" (include "chatcli.fullname" .)) }}
        {{- end }}
        {{- if .Values.bootstrap.enabled }}
        - name: bootstrap
          configMap:
            name: {{ .Values.bootstrap.existingConfigMap | default (printf "%s-bootstrap" (include "chatcli.fullname" .)) }}
        {{- end }}
        {{- if .Values.memory.enabled }}
        - name: memory
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "chatcli.fullname" . }}-sessions
          {{- else }}
          emptyDir:
            sizeLimit: 200Mi
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
