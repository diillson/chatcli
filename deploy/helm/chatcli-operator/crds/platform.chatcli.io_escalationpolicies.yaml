---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: escalationpolicies.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: EscalationPolicy
    listKind: EscalationPolicyList
    plural: escalationpolicies
    shortNames:
    - ep
    singular: escalationpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.levels
      name: Levels
      type: integer
    - jsonPath: .spec.defaultPolicy
      name: Default
      type: boolean
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EscalationPolicy defines escalation chains for incident management.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EscalationPolicySpec defines the desired state of EscalationPolicy.
            properties:
              defaultPolicy:
                description: DefaultPolicy marks this as the default policy when no
                  specific policy matches.
                type: boolean
              enabled:
                default: true
                description: Enabled activates this policy.
                type: boolean
              levels:
                description: Levels defines the escalation chain from L1 to LN.
                items:
                  description: EscalationLevel defines a single level in the escalation
                    chain.
                  properties:
                    name:
                      description: Name is a human-readable identifier (e.g., "L1-OnCall",
                        "L2-SeniorSRE", "L3-Management").
                      type: string
                    notifyChannels:
                      description: NotifyChannels lists notification channel names
                        (from NotificationPolicy) to use.
                      items:
                        type: string
                      type: array
                    repeatIntervalMinutes:
                      default: 0
                      description: |-
                        RepeatIntervalMinutes re-notifies at this interval until acknowledged or escalated.
                        0 = no repeat.
                      format: int32
                      type: integer
                    targets:
                      description: Targets defines who to notify at this level.
                      items:
                        description: EscalationTarget defines who to notify at a given
                          escalation level.
                        properties:
                          name:
                            description: Name of the target (user email, team name,
                              channel name, or oncall schedule).
                            type: string
                          type:
                            description: Type of target.
                            enum:
                            - channel
                            - user
                            - team
                            - oncall
                            type: string
                        required:
                        - name
                        - type
                        type: object
                      type: array
                    timeoutMinutes:
                      default: 15
                      description: TimeoutMinutes is the time to wait before escalating
                        to the next level.
                      format: int32
                      type: integer
                  required:
                  - name
                  - targets
                  - timeoutMinutes
                  type: object
                type: array
              severities:
                description: Severities this policy applies to (empty = all).
                items:
                  description: IssueSeverity represents the severity level of an issue.
                  enum:
                  - critical
                  - high
                  - medium
                  - low
                  type: string
                type: array
            required:
            - enabled
            - levels
            type: object
          status:
            description: EscalationPolicyStatus defines the observed state of EscalationPolicy.
            properties:
              activeEscalations:
                description: ActiveEscalations tracks ongoing escalations.
                items:
                  description: ActiveEscalation tracks an ongoing escalation for an
                    issue.
                  properties:
                    acknowledgedAt:
                      description: AcknowledgedAt is when the escalation was acknowledged
                        (nil if not).
                      format: date-time
                      type: string
                    acknowledgedBy:
                      description: AcknowledgedBy identifies who acknowledged.
                      type: string
                    currentLevel:
                      description: CurrentLevel is the current escalation level index
                        (0-based).
                      format: int32
                      type: integer
                    escalatedAt:
                      description: EscalatedAt is when the current level was reached.
                      format: date-time
                      type: string
                    issueName:
                      description: IssueName is the name of the escalated issue.
                      type: string
