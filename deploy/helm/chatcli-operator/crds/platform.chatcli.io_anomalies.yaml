metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: anomalies.platform.chatcli.io
spec:
  group: platform.chatcli.io
  names:
    kind: Anomaly
    listKind: AnomalyList
    plural: anomalies
    shortNames:
    - anom
    singular: anomaly
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.source
      name: Source
      type: string
    - jsonPath: .spec.signalType
      name: Signal
      type: string
    - jsonPath: .status.correlated
      name: Correlated
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Anomaly is a raw signal from watchers before correlation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AnomalySpec defines the desired state of an Anomaly.
            properties:
              description:
                description: Description of the anomaly.
                type: string
              resource:
                description: Resource affected by the anomaly.
                properties:
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
