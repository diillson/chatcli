apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatcli-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "chatcli-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chatcli-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chatcli-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            {{- if .Values.leaderElect }}
            - --leader-elect
            {{- end }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:{{ .Values.health.port }}
          env:
          {{- if .Values.prometheusUrl }}
            - name: PROMETHEUS_URL
              value: {{ .Values.prometheusUrl | quote }}
          {{- end }}
          {{- if .Values.api.port }}
            - name: CHATCLI_AIOPS_PORT
              value: {{ .Values.api.port | quote }}
          {{- end }}
          {{- /* Security configuration */ -}}
          {{- if .Values.security.devMode }}
            - name: CHATCLI_OPERATOR_DEV_MODE
              value: "true"
          {{- end }}
          {{- if .Values.security.apiTLS.certFile }}
            - name: CHATCLI_AIOPS_TLS_CERT
              value: {{ .Values.security.apiTLS.certFile | quote }}
          {{- end }}
          {{- if .Values.security.apiTLS.keyFile }}
            - name: CHATCLI_AIOPS_TLS_KEY
              value: {{ .Values.security.apiTLS.keyFile | quote }}
          {{- end }}
          {{- if .Values.security.grpcTLS.certFile }}
            - name: CHATCLI_GRPC_TLS_CERT
              value: {{ .Values.security.grpcTLS.certFile | quote }}
          {{- end }}
          {{- if .Values.security.grpcTLS.keyFile }}
            - name: CHATCLI_GRPC_TLS_KEY
              value: {{ .Values.security.grpcTLS.keyFile | quote }}
          {{- end }}
          {{- if .Values.security.grpcTLS.caFile }}
            - name: CHATCLI_GRPC_TLS_CA
              value: {{ .Values.security.grpcTLS.caFile | quote }}
          {{- end }}
          {{- if .Values.security.allowedResourceTypes }}
            - name: CHATCLI_ALLOWED_RESOURCE_TYPES
              value: {{ .Values.security.allowedResourceTypes | quote }}
          {{- end }}
          {{- if .Values.security.logScrubPatterns }}
            - name: CHATCLI_LOG_SCRUB_PATTERNS
              value: {{ .Values.security.logScrubPatterns | quote }}
          {{- end }}
          {{- if .Values.security.corsOrigin }}
            - name: CHATCLI_CORS_ORIGIN
              value: {{ .Values.security.corsOrigin | quote }}
          {{- end }}
          {{- if .Values.security.auditLogPath }}
            - name: CHATCLI_AUDIT_LOG_PATH
              value: {{ .Values.security.auditLogPath | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
            - name: api
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
