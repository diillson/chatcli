{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chatcli-operator.fullname" . }}
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
rules:
  # ──────────────────────────────────────────────────
  # Platform CRDs (all 17)
  # ──────────────────────────────────────────────────
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - instances
      - issues
      - anomalies
      - aiinsights
      - remediationplans
      - runbooks
      - postmortems
      - sourcerepositories
      - notificationpolicies
      - escalationpolicies
      - approvalpolicies
      - approvalrequests
      - servicelevelobjectives
      - incidentslas
      - auditevents
      - chaosexperiments
      - clusterregistrations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - instances/status
      - instances/finalizers
      - issues/status
      - issues/finalizers
      - anomalies/status
      - aiinsights/status
      - remediationplans/status
      - postmortems/status
      - sourcerepositories/status
      - notificationpolicies/status
      - escalationpolicies/status
      - approvalpolicies/status
      - approvalrequests/status
      - servicelevelobjectives/status
      - incidentslas/status
      - auditevents/status
      - chaosexperiments/status
      - clusterregistrations/status
    verbs: ["get", "update", "patch"]

  # ──────────────────────────────────────────────────
  # Core resources
  # ──────────────────────────────────────────────────
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["services", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]

  # ──────────────────────────────────────────────────
  # Workload resources (remediation targets)
  # ──────────────────────────────────────────────────
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["controllerrevisions"]
    verbs: ["get", "list"]

  # ──────────────────────────────────────────────────
  # Autoscaling, Networking, Policy, Discovery
  # ──────────────────────────────────────────────────
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]

  # ──────────────────────────────────────────────────
  # GitOps (optional — ArgoCD, Flux)
  # ──────────────────────────────────────────────────
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]

  # ──────────────────────────────────────────────────
  # Metrics
  # ──────────────────────────────────────────────────
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

  # ──────────────────────────────────────────────────
  # RBAC — namespace-scoped roles for Instance watcher
  # ──────────────────────────────────────────────────
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Security (H5): ClusterRoles are read-only — never create/update/delete at runtime.
  # Shared ClusterRoles (chatcli-watcher, chatcli-role-*) are pre-provisioned by this chart
  # and referenced by per-Instance ClusterRoleBindings via the "bind" verb below.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["get", "list", "watch"]
  # "bind" allowed only on the pre-provisioned ClusterRoles — prevents an attacker who
  # compromises the operator from referencing a more-privileged ClusterRole in a new CRB.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    resourceNames:
      - chatcli-watcher
      - chatcli-role-viewer
      - chatcli-role-operator
      - chatcli-role-admin
      - chatcli-role-superadmin
    verbs: ["bind"]
  # ClusterRoleBindings: the operator creates one per Instance (watcher) and one per user
  # (platform roles). Each binding can only reference the whitelisted ClusterRoles above.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # ──────────────────────────────────────────────────
  # Leader election
  # ──────────────────────────────────────────────────
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chatcli-operator.fullname" . }}
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chatcli-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chatcli-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# ──────────────────────────────────────────────────
# Shared ClusterRole: chatcli-watcher
# Referenced by ClusterRoleBindings the operator creates per-Instance when a Watcher
# spans multiple namespaces. Pre-provisioned here so the operator never needs privilege
# escalation rights on ClusterRoles (Security H5).
# ──────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-watcher
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: watcher
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
# ──────────────────────────────────────────────────
# Platform role ClusterRoles (viewer / operator / admin / superadmin)
# Referenced by RoleBindings the operator creates when granting a user a platform role.
# ──────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-viewer
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - issues
      - anomalies
      - aiinsights
      - postmortems
      - auditevents
      - servicelevelobjectives
      - incidentslas
      - remediationplans
      - runbooks
      - approvalrequests
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-operator
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - issues
      - anomalies
      - aiinsights
      - postmortems
      - auditevents
      - servicelevelobjectives
      - incidentslas
      - remediationplans
      - runbooks
      - approvalrequests
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.chatcli.io"]
    resources: ["issues", "approvalrequests", "postmortems"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-admin
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - issues
      - anomalies
      - aiinsights
      - postmortems
      - auditevents
      - servicelevelobjectives
      - incidentslas
      - remediationplans
      - approvalrequests
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - runbooks
      - notificationpolicies
      - servicelevelobjectives
      - incidentslas
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chatcli-role-superadmin
  labels:
    {{- include "chatcli-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - instances
      - issues
      - anomalies
      - aiinsights
      - remediationplans
      - runbooks
      - postmortems
      - sourcerepositories
      - notificationpolicies
      - escalationpolicies
      - approvalpolicies
      - approvalrequests
      - servicelevelobjectives
      - incidentslas
      - auditevents
      - chaosexperiments
      - clusterregistrations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["platform.chatcli.io"]
    resources:
      - instances/status
      - issues/status
      - anomalies/status
      - aiinsights/status
      - remediationplans/status
      - postmortems/status
      - sourcerepositories/status
      - notificationpolicies/status
      - escalationpolicies/status
      - approvalpolicies/status
      - approvalrequests/status
      - servicelevelobjectives/status
      - incidentslas/status
      - auditevents/status
      - chaosexperiments/status
      - clusterregistrations/status
    verbs: ["get", "update", "patch"]
{{- end }}
