# ChatCLI Operator Helm Chart - Default Values

replicaCount: 1

image:
  repository: ghcr.io/diillson/chatcli-operator
  # tag defaults to Chart.appVersion when empty — ensures version consistency.
  # Override with --set image.tag=custom if needed.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Leader election (recommended for HA with replicaCount > 1)
leaderElect: true

# AIOps REST API and Web Dashboard
api:
  # Port for the REST API and embedded web dashboard
  port: 8090

# Prometheus metrics endpoint
metrics:
  # Port for Prometheus metrics scraping
  port: 8080

# Health probes
health:
  port: 8081

# Prometheus URL for metrics collection during incident analysis.
# When set, the operator queries Prometheus for CPU/memory/latency/error rate
# trends correlated with incidents, providing quantitative context to the AI.
# Example: "http://prometheus-server.monitoring.svc:9090"
prometheusUrl: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC - the operator always needs cluster-wide access
rbac:
  create: true

# CRD lifecycle management.
#
# Helm only applies files from the chart's crds/ directory on first install —
# `helm upgrade` skips them by design (Helm 3 hard restriction). That leaves
# operators upgrading between chart versions running the new controller binary
# against the OLD CRD schema, which surfaced as GAP-06 in the 2026-05-23 chaos
# test (chart 1.121.0 -> 1.122.0 introduced the IssueState Contained and the
# PostMortemSpec.RequiresHumanAction/RequiredAction fields in the binary but
# users upgrading saw "Unsupported value: Contained" rejections from the API
# server because the cluster still carried the 1.121.0 CRD schema).
#
# This block controls the pre-install/pre-upgrade hook that re-applies every
# CRD shipped with the chart so the schema is always in sync with the binary.
# Disable only if you manage CRDs out of band (separate cert-manager-crds-style
# chart, GitOps with explicit CRD application, etc.).
crdUpgrade:
  enabled: true
  # Image used by the pre-upgrade Job to run `kubectl apply`. Defaults to the
  # OFFICIAL Kubernetes-project kubectl image at registry.k8s.io — versioned
  # in lockstep with the Kubernetes release, distroless (no shell, no package
  # manager), and signed/SBOM'd by the project. Avoid pinning the tag to a
  # major-minor stub like "v1.31" — that is NOT a valid manifest reference;
  # the registry only resolves fully-qualified patch tags like "v1.31.10".
  # Override only for air-gapped mirrors.
  image:
    repository: registry.k8s.io/kubectl
    tag: "v1.31.10"
    pullPolicy: IfNotPresent
  # Pod resource limits for the hook Job. Defaults keep it lightweight — the
  # job is short-lived (typically <30s) and only runs kubectl apply.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Tolerations on the hook Job so it can run on tainted control-plane nodes
  # during cluster-wide chart upgrades. Empty by default.
  tolerations: []
  # NodeSelector for the hook Job. Empty by default.
  nodeSelector: {}

service:
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Security hardening configuration for the operator
security:
  # Dev mode disables authentication on the REST API (NEVER use in production)
  devMode: false
  # TLS for the REST API (port 8090)
  apiTLS:
    certFile: ""  # CHATCLI_AIOPS_TLS_CERT
    keyFile: ""   # CHATCLI_AIOPS_TLS_KEY
  # gRPC TLS for communication with ChatCLI server
  grpcTLS:
    certFile: ""  # CHATCLI_GRPC_TLS_CERT
    keyFile: ""   # CHATCLI_GRPC_TLS_KEY
    caFile: ""    # CHATCLI_GRPC_TLS_CA
  # Allowed resource types for remediation (comma-separated)
  allowedResourceTypes: ""
  # Custom log scrub patterns (comma-separated regexes)
  logScrubPatterns: ""
  # CORS allowed origin (empty = deny all)
  corsOrigin: ""
  # Audit log file path
  auditLogPath: ""

# Extra environment variables for the operator pod
extraEnv: []
# - name: CHATCLI_ALLOWED_RESOURCE_TYPES
#   value: "Deployment,Service,ConfigMap,HPA"

nodeSelector: {}
tolerations: []
affinity: {}

# Prometheus ServiceMonitor (requires Prometheus Operator)
serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: ""
  labels: {}
