apiVersion: v1
kind: ConfigMap
metadata:
  name: chatcli-grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: chatcli-operator
    grafana_dashboard: "1"
  annotations:
    grafana-folder: "ChatCLI AIOps"
data:
  aiops-overview.json: |
    # Content loaded from deploy/grafana/aiops-overview.json
    # Use: kubectl create configmap chatcli-grafana-dashboards --from-file=deploy/grafana/ -n monitoring
  slo-burn-rate.json: |
    # Content loaded from deploy/grafana/slo-burn-rate.json
  incident-timeline.json: |
    # Content loaded from deploy/grafana/incident-timeline.json
  remediation-stats.json: |
    # Content loaded from deploy/grafana/remediation-stats.json
---
# Grafana Dashboard Provisioning - ServiceMonitor for Prometheus scraping
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chatcli-operator
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: chatcli-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chatcli-operator
  namespaceSelector:
    any: true
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chatcli-server
  namespace: monitoring
  labels:
    app.kubernetes.io/managed-by: chatcli-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chatcli-server
  namespaceSelector:
    any: true
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
