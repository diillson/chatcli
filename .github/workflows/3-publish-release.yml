name: Release on main (PR + GitHub Release)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release_please:
    name: Release Please (create PR and release)
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.rp.outputs.tag_name }}
      release_created: ${{ steps.rp.outputs.release_created }}
    steps:
      - name: Release Please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build_and_upload:
    name: Build e upload de binários (após release criada)
    needs: [release_please]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          CGO_ENABLED: 0
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="$TAG_NAME"
          LDFLAGS="-X 'github.com/diillson/chatcli/version.Version=${VERSION}' -X 'github.com/diillson/chatcli/version.CommitHash=${COMMIT_HASH}' -X 'github.com/diillson/chatcli/version.BuildDate=${BUILD_DATE}'"
          
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o chatcli-linux-amd64       ./main.go
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o chatcli-darwin-amd64      ./main.go
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o chatcli-darwin-arm64      ./main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o chatcli-windows-amd64.exe ./main.go
          
          ./chatcli-linux-amd64 --version || true

      - name: Wait for release availability
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          for i in {1..18}; do
            if gh release view "$TAG_NAME" >/dev/null 2>&1; then
              echo "Release $TAG_NAME disponível."
              break
            fi
            echo "Aguardando release ficar disponível ($i/18)..."
            sleep 5
          done

      - name: Upload assets with retry
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          files=(
            chatcli-linux-amd64
            chatcli-darwin-amd64
            chatcli-darwin-arm64
            chatcli-windows-amd64.exe
          )
          for f in "${files[@]}"; do
            for attempt in {1..4}; do
              if gh release upload "$TAG_NAME" "$f" --clobber; then
                echo "Enviado: $f"
                break
              fi
              echo "Falha ao enviar $f (tentativa $attempt). Retentando..."
              sleep $((attempt*5))
            done
          done

  # ---------------------------------------------------------------------------
  # ChatCLI Docker: native per-arch builds (no QEMU) → Trivy gate → merge manifest → sign
  # ---------------------------------------------------------------------------
  docker_chatcli_build:
    name: "Build ChatCLI (${{ matrix.arch }})"
    needs: [release_please]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/diillson/chatcli

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/diillson/chatcli,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=chatcli-${{ matrix.arch }}
          cache-to: type=gha,scope=chatcli-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: chatcli-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker_chatcli_trivy:
    name: "Trivy scan — ChatCLI"
    needs: [release_please, docker_chatcli_build]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout (for .trivyignore.yaml)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
          sparse-checkout: .trivyignore.yaml

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: chatcli-digest-amd64
          path: /tmp/digests

      - name: Resolve digest
        id: digest
        run: echo "sha=sha256:$(ls /tmp/digests)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy gate (fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/diillson/chatcli@${{ steps.digest.outputs.sha }}"
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          scanners: vuln
          exit-code: '1'

  docker_chatcli_merge:
    name: "Merge & Sign — ChatCLI manifest"
    needs: [release_please, docker_chatcli_build, docker_chatcli_trivy]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          pattern: chatcli-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/diillson/chatcli
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release_please.outputs.tag_name }}
            type=raw,value=latest

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf 'ghcr.io/diillson/chatcli@sha256:%s ' *)

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest with Cosign (keyless OIDC)
        run: |
          cosign sign --yes --recursive \
            "ghcr.io/diillson/chatcli:${{ steps.meta.outputs.version }}"

  # ---------------------------------------------------------------------------
  # Operator Docker: native per-arch builds (no QEMU) → Trivy gate → merge manifest → sign
  # ---------------------------------------------------------------------------
  docker_operator_build:
    name: "Build Operator (${{ matrix.arch }})"
    needs: [release_please]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/diillson/chatcli-operator

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./operator/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/diillson/chatcli-operator,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=operator-${{ matrix.arch }}
          cache-to: type=gha,scope=operator-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: operator-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker_operator_trivy:
    name: "Trivy scan — Operator"
    needs: [release_please, docker_operator_build]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout (for .trivyignore.yaml)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
          sparse-checkout: .trivyignore.yaml

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: operator-digest-amd64
          path: /tmp/digests

      - name: Resolve digest
        id: digest
        run: echo "sha=sha256:$(ls /tmp/digests)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy gate (fixable HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/diillson/chatcli-operator@${{ steps.digest.outputs.sha }}"
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          scanners: vuln
          exit-code: '1'

  docker_operator_merge:
    name: "Merge & Sign — Operator manifest"
    needs: [release_please, docker_operator_build, docker_operator_trivy]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          pattern: operator-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/diillson/chatcli-operator
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release_please.outputs.tag_name }}
            type=raw,value=latest

      - name: Create multi-arch manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf 'ghcr.io/diillson/chatcli-operator@sha256:%s ' *)

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest with Cosign (keyless OIDC)
        run: |
          cosign sign --yes --recursive \
            "ghcr.io/diillson/chatcli-operator:${{ steps.meta.outputs.version }}"

  # Atualiza a formula do Homebrew tap após upload dos binários
  update_homebrew:
    name: Update Homebrew Formula
    needs: [release_please, build_and_upload]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: diillson/homebrew-chatcli
          token: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Download release assets and compute SHA256
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VER="${TAG_NAME#v}"

          echo "Downloading binaries for v${VER}..."

          for attempt in {1..6}; do
            if curl -sfL -o chatcli-darwin-arm64 \
              "https://github.com/diillson/chatcli/releases/download/v${VER}/chatcli-darwin-arm64"; then
              break
            fi
            echo "Waiting for assets to be available (attempt $attempt/6)..."
            sleep 10
          done

          curl -sfL -o chatcli-darwin-amd64 \
            "https://github.com/diillson/chatcli/releases/download/v${VER}/chatcli-darwin-amd64"
          curl -sfL -o chatcli-linux-amd64 \
            "https://github.com/diillson/chatcli/releases/download/v${VER}/chatcli-linux-amd64"

          echo "SHA_DARWIN_ARM64=$(sha256sum chatcli-darwin-arm64 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_DARWIN_AMD64=$(sha256sum chatcli-darwin-amd64 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_LINUX_AMD64=$(sha256sum chatcli-linux-amd64 | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "VER=${VER}" >> "$GITHUB_ENV"

      - name: Generate formula
        run: |
          cat > Formula/chatcli.rb << 'ENDOFFORMULA'
          # typed: false
          # frozen_string_literal: true

          # Homebrew formula for ChatCLI
          # Repository: https://github.com/diillson/chatcli
          class Chatcli < Formula
            desc "Command-line interface for interacting with multiple LLM providers"
            homepage "https://chatcli.edilsonfreitas.com"
            license "Apache-2.0"
          ENDOFFORMULA

          # Append version and platform blocks with shell variable expansion
          cat >> Formula/chatcli.rb << ENDOFFORMULA
            version "${VER}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/diillson/chatcli/releases/download/v#{version}/chatcli-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"

                def install
                  bin.install "chatcli-darwin-arm64" => "chatcli"
                end
              elsif Hardware::CPU.intel?
                url "https://github.com/diillson/chatcli/releases/download/v#{version}/chatcli-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"

                def install
                  bin.install "chatcli-darwin-amd64" => "chatcli"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/diillson/chatcli/releases/download/v#{version}/chatcli-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"

                def install
                  bin.install "chatcli-linux-amd64" => "chatcli"
                end
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/chatcli --version 2>&1", 0)
            end
          end
          ENDOFFORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/chatcli.rb

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/chatcli.rb
          git diff --cached --quiet && echo "Formula already up to date" && exit 0
          git commit -m "chore: update chatcli formula to v${VER}"
          git push

  helm_charts:
    name: Publish Helm Charts to GHCR (OCI)
    needs: [release_please]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR with ORAS
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Update chart versions
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"

          # Update chatcli server chart
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/chatcli/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/chatcli/Chart.yaml

          # Update chatcli-operator chart
          sed -i "s/^version:.*/version: ${VERSION}/" deploy/helm/chatcli-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" deploy/helm/chatcli-operator/Chart.yaml

      - name: Inject ArtifactHub changelog from CHANGELOG.md
        run: |
          bash scripts/generate-artifacthub-changelog.sh \
            deploy/helm/chatcli/Chart.yaml \
            deploy/helm/chatcli-operator/Chart.yaml

      - name: Package charts
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          mkdir -p /tmp/charts
          helm package deploy/helm/chatcli/ -d /tmp/charts/
          helm package deploy/helm/chatcli-operator/ -d /tmp/charts/
          ls -la /tmp/charts

      - name: Push chatcli chart
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          helm push "/tmp/charts/chatcli-${VERSION}.tgz" oci://ghcr.io/diillson/charts

      - name: Push chatcli-operator chart
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          helm push "/tmp/charts/chatcli-operator-${VERSION}.tgz" oci://ghcr.io/diillson/charts

      - name: Login to GHCR with crane
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Sign chatcli chart with Cosign (keyless OIDC)
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          CHART_DIGEST=$(crane digest "ghcr.io/diillson/charts/chatcli:${VERSION}")
          cosign sign --yes "ghcr.io/diillson/charts/chatcli@${CHART_DIGEST}"

      - name: Sign chatcli-operator chart with Cosign (keyless OIDC)
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          CHART_DIGEST=$(crane digest "ghcr.io/diillson/charts/chatcli-operator:${VERSION}")
          cosign sign --yes "ghcr.io/diillson/charts/chatcli-operator@${CHART_DIGEST}"

      - name: Push Artifact Hub metadata for chatcli
        run: |
          oras push \
            ghcr.io/diillson/charts/chatcli:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub/chatcli-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Push Artifact Hub metadata for chatcli-operator
        run: |
          oras push \
            ghcr.io/diillson/charts/chatcli-operator:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub/chatcli-operator-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

  # Atualiza versões na documentação (chatcli.ai) automaticamente
  update_docs_version:
    name: Update docs version (chatcli.ai)
    needs: [release_please]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v6
        with:
          repository: diillson/chatcli.ai
          token: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Update version references
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          NEW_VERSION="${TAG_NAME#v}"
          OLD_VERSION=$(cat VERSION | tr -d '[:space:]')

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "Versão já está atualizada ($NEW_VERSION). Nada a fazer."
            exit 0
          fi

          echo "Atualizando versão: $OLD_VERSION -> $NEW_VERSION"

          # Atualiza todas as referências de versão nos arquivos .mdx
          find . -name "*.mdx" -exec sed -i "s/${OLD_VERSION}/${NEW_VERSION}/g" {} +

          # Atualiza o arquivo VERSION
          echo "$NEW_VERSION" > VERSION

          echo "Arquivos alterados:"
          git diff --name-only

      - name: Commit and push
        env:
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: |
          set -euo pipefail
          NEW_VERSION="${TAG_NAME#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && echo "Nenhuma alteração para commitar." && exit 0

          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push

  # Opcional: sincroniza main -> develop após publicar a release
  sync_main_to_develop:
    needs: [release_please]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configura usuário git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync release-please from main to develop (rebase)
        run: |
          git checkout develop
          # Pega o último commit da main (que é o do release-please)
          # last_commit=$(git log origin/main -1 --pretty=format:%H)
          
          # Aplica esse commit na develop como squash
          # git cherry-pick -n $last_commit || true
          git fetch origin

          # Cria um commit único na develop com a mensagem da release
          # msg=$(git log -1 --pretty=%B $last_commit)
          # git commit -m "chore(sync): propagate release-please changes - $msg" || echo "Nada para commitar"
