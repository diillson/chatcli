name: CI (Lint, Fmt, Test, Coverage)

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # JOB 1: Executa os testes e gera o relatório de cobertura
  lint-and-test:
    name: Lint, Test and Generate Coverage
    runs-on: ubuntu-latest
    if: github.actor != 'release-please[bot]' && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Deep clone so --new-from-rev can resolve origin/<base>.
          # Without this, golangci-lint cannot enumerate the diff and
          # would fail to apply diff-only enforcement.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint (diff-only)
        # The stricter .golangci.yml introduced in feat/quality-gate-overhaul
        # would flag thousands of pre-existing violations across legacy code.
        # --new-from-rev keeps enforcement scoped to lines this PR adds or
        # modifies, matching what the Quality Gate Floor 1 does.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m --new-from-rev=origin/${{ github.base_ref }}

      - name: Check gofmt
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "::error file=gofmt::The following files are not formatted:"
            echo "$output"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          go test -race -coverprofile=coverage.out ./... -v
          go tool cover -func=coverage.out > coverage.txt

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.txt
          retention-days: 7 # O artefato só precisa existir por 7 dias
