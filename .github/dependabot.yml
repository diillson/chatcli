version: 2
updates:
  # Go module dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "diillson"
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci/cd"
      - "dependencies"

  # Dockerfile base images (main)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "dependencies"

  # Go module dependencies (operator — separate go.mod)
  - package-ecosystem: "gomod"
    directory: "/operator"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "diillson"
    labels:
      - "dependencies"
      - "operator"

  # Dockerfile base images (operator)
  - package-ecosystem: "docker"
    directory: "/operator"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "dependencies"
