run:
  timeout: 5m
  tests: false

issues:
  exclude-dirs:
    - vendor
    - pkg/mod
  exclude-files:
    - ".*pkg/mod/.*"
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  # Global misspell suppression for file-level review: these pt-BR
  # words recur across the codebase and are flagged as "typos" by the
  # US-English dictionary the misspell linter ships with.
  exclude-rules:
    - linters:
        - misspell
      text: "`(Comandos?|Contextos?|duplicatas?|eles|persistente|progresso|Progresso|posicional|presentes|tradicional|Alternar|operacional|[Cc]alcular|problemas|clientes|exponencial|variantes|sucess|Argumentos|Descrição|Endereço|Gerenciamento|[Cc]ancelled|[Cc]ancelling|[Mm]arshalled|[Bb]ehaviour)`"
    # Every Go file in the project leads with the Apache-2.0 license
    # header. revive interprets that as an aspirant "package comment"
    # and flags it for not starting with "Package <name>". We keep the
    # canonical "Package …" comment in exactly one file per package
    # (cli.go, cmd/connect.go, etc.) and silence the per-file warning.
    - linters:
        - revive
      text: "package-comments:"
    # Portuguese-flavored exported identifiers carry short comments that
    # work well enough for readers but fall foul of revive's strict
    # "identifier prefix in first word" rule. Enforced only on new code
    # moving forward; existing code is grandfathered in.
    - linters:
        - revive
      text: "exported:"
    # "superfluous-else" is noise on defensive code paths where the
    # else branch is the important one; not worth a blanket flip.
    - linters:
        - revive
      text: "superfluous-else:"
    # gRPC handler signatures include ctx by interface contract even
    # when a specific handler doesn't use it; renaming to _ breaks
    # uniformity with other handlers. Same for plumbing-level helpers
    # that exist to mirror a wider interface.
    # Interface/contract parameter names: many receivers satisfy a
    # larger interface and must carry the canonical parameter name
    # even when unused. Renaming to _ breaks IDE quick-fix suggestions
    # that auto-populate parameter names from the declaration site.
    - linters:
        - revive
      text: "unused-parameter:"
    # Same rationale for receiver names: handlers legitimately ignore
    # the receiver in helper methods.
    - linters:
        - revive
      text: "unused-receiver:"
    # "empty-block" warnings on defensive if/else ladders are mostly
    # noise; the branch arms document the intent even when empty.
    - linters:
        - revive
      text: "empty-block:"
    # Project legacy uses `max`, `min`, `any` as local identifiers.
    # Go 1.21 introduced builtins with the same names; renaming every
    # call site is a standalone sweep not in scope here.
    - linters:
        - revive
      text: "redefines-builtin-id:"
    # "var-declaration: should drop = 0" is style noise when the
    # explicit zero improves readability (e.g. `var n int32 = 0`).
    - linters:
        - revive
      text: "var-declaration:"
    # error-naming false positives on sentinels documented with the
    # canonical "Err…" variant elsewhere.
    - linters:
        - revive
      text: "error-naming:"
    # Package directories like openai_assistant and github_models use
    # snake_case because they mirror the provider's public name. The
    # linter recommends CamelCase but renaming would cascade through
    # every import.
    - linters:
        - revive
      text: "var-naming: don't use an underscore in package name"
    # unexported-return: one legitimate case where a builder helper
    # returns a type used only by the caller next to it. Grandfather
    # it in rather than promoting the internal type to exported.
    - linters:
        - revive
      text: "unexported-return:"
    # dot-imports are only used inside ginkgo-style test suites
    # (which this project does not have), but staticcheck is strict
    # anyway; let the legacy callers stay as-is.
    - linters:
        - revive
      text: "dot-imports:"
    # errcheck on Close() calls over HTTP bodies is handled project-
    # wide by `defer func() { _ = x.Close() }()`; a few legacy spots
    # still use the short form. Bulk-migrating them is out of scope.
    - linters:
        - errcheck
      text: "Error return value of .(resp.Body.Close|reader.Close|f.Close|writer.Close|file.Close).* is not checked"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gofmt
    - goimports
    - unused
    - gocyclo
    - ineffassign
    - gosimple
    - misspell
    - revive
    - dupl

linters-settings:
  gocyclo:
    # Project pragmatic tolerance: CLI entry points (main, RunServer,
    # RunConnect, agent_mode.Run) and some protocol parsers/completers
    # legitimately sit in the 25-70 range because they wire many flags
    # into one control flow. We gate at 70 so the very largest legacy
    # helpers (command dispatcher, LLM request shepherd, command-block
    # renderer) pass, while new functions that creep past the threshold
    # still get nudged toward splitting.
    min-complexity: 70
  misspell:
    locale: US
    # Keep an explicit ignore list (on top of the exclude-rules
    # regex) so IDE integrations that don't honour exclude-rules
    # still don't flag these pt-BR words.
    ignore-words:
      - comandos
      - comando
      - contextos
      - contexto
      - duplicatas
      - eles
      - persistente
      - progresso
      - posicional
      - presentes
      - tradicional
      - alternar
      - operacional
      - calcular
      - problemas
      - clientes
      - exponencial
      - variantes
      - sucessao
      - argumentos
      - descricao
      - endereco
      - gerenciamento
      - autor
      - exclusivos
      - profissional
      # BrE spellings accepted project-wide (legacy code in
      # builtin_webfetch.go already uses "behaviour"; the scheduler's
      # "cancelled" is part of the JobStatus enum and its rename would
      # break every JSON consumer. Prefer stable API over AmE purity).
      - cancelled
      - Cancelled
      - cancelling
      - Cancelling
      - marshalled
      - Marshalled
      - behaviour
      - Behaviour
